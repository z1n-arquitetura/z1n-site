<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height: 100%; overflow: hidden; background: #000; }

.slider {
    width: 100vw;
    height: 100vh;
    position: relative;
}

.slide {
    width: 100%;
    height: 100%;
    position: absolute;
    display: none;
    justify-content: center;
    align-items: center;
}

.slide.active { display: flex; }

.slide-wrapper {
    position: relative;
    display: inline-block;
    max-width: 100%;
    max-height: 100%;
}

canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
}

/* LINKS */
.link {
    position: absolute;
    z-index: 9999;
    background: rgba(255,0,0,0.3);
    border: 2px solid red;
    cursor: move;
}

/* BOTÕES */
.nav {
    position: absolute;
    bottom: 30px;
    z-index: 100;
    color: white;
    font-size: 42px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    width: 65px;
    height: 65px;
    cursor: pointer;
}

.prev { left: 20px; }
.next { right: 20px; }
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const pdfUrl = 'https://z1n-arq.com.br/portfolio.pdf';

let slides = [];
let current = 0;

/* 🔥 HOTSPOTS (você vai ajustar depois visualmente) */
const hotspots = {
  1: [
    { href: "https://wa.me/5516991128533", left: 5, top: 58, w: 18, h: 10 },
    { href: "tel:+5516991128533", left: 78, top: 58, w: 12, h: 10 },
    { href: "https://wa.me/5516991128533", left: 25, top: 56, w: 50, h: 12 },
  ],

  6: [
    { href: "https://wa.me/5516991128533", left: 5, top: 70, w: 18, h: 10 },
    { href: "tel:+5516991128533", left: 75, top: 70, w: 15, h: 10 },
  ],

  8: [
    { href: "https://wa.me/5516991128533", left: 40, top: 75, w: 20, h: 10 },
    { href: "tel:+5516991128533", left: 20, top: 65, w: 60, h: 12 },
  ]
};

pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {

    for (let i = 1; i <= pdf.numPages; i++) {

        pdf.getPage(i).then(page => {

            const viewportBase = page.getViewport({ scale: 1 });

            const scale = Math.min(
                (innerWidth * 0.96) / viewportBase.width,
                (innerHeight * 0.92) / viewportBase.height
            );

            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const ctx = canvas.getContext('2d');

            const wrapper = document.createElement('div');
            wrapper.className = 'slide-wrapper';

            const slide = document.createElement('div');
            slide.className = 'slide';

            wrapper.appendChild(canvas);
            slide.appendChild(wrapper);
            document.getElementById('slider').appendChild(slide);

            slides.push(slide);

            page.render({ canvasContext: ctx, viewport }).promise.then(() => {

                if (hotspots[i]) {
                    hotspots[i].forEach(area => {
                        addLink(wrapper, area);
                    });
                }

                if (i === 1) slide.classList.add("active");
            });
        });
    }

}).catch(() => alert("Erro ao carregar PDF"));

/* ========================= */
/* 🔥 LINK COM DRAG E RESIZE */
/* ========================= */
function addLink(wrapper, area) {
    const link = document.createElement('a');

    link.href = area.href;
    link.target = "_blank";
    link.className = "link";

    link.style.left   = area.left + "%";
    link.style.top    = area.top + "%";
    link.style.width  = area.w + "%";
    link.style.height = area.h + "%";

    wrapper.appendChild(link);

    makeDraggable(link, wrapper);
}

/* DRAG + RESIZE */
function makeDraggable(el, parent) {
    let isDragging = false;
    let startX, startY, startLeft, startTop;

    el.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = parseFloat(el.style.left);
        startTop = parseFloat(el.style.top);
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const rect = parent.getBoundingClientRect();

        let dx = (e.clientX - startX) / rect.width * 100;
        let dy = (e.clientY - startY) / rect.height * 100;

        el.style.left = (startLeft + dx) + "%";
        el.style.top  = (startTop + dy) + "%";
    });

    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;

            console.log({
                left: parseFloat(el.style.left),
                top: parseFloat(el.style.top),
                width: parseFloat(el.style.width),
                height: parseFloat(el.style.height)
            });
        }
    });

    /* RESIZE com scroll */
    el.addEventListener('wheel', (e) => {
        e.preventDefault();

        let w = parseFloat(el.style.width);
        let h = parseFloat(el.style.height);

        const delta = e.deltaY > 0 ? -1 : 1;

        el.style.width  = (w + delta) + "%";
        el.style.height = (h + delta) + "%";
    });
}

/* ========================= */
/* NAVEGAÇÃO */
/* ========================= */
function next() {
    current = (current + 1) % slides.length;
    updateSlide();
}

function prev() {
    current = (current - 1 + slides.length) % slides.length;
    updateSlide();
}

function updateSlide() {
    slides.forEach(s => s.classList.remove("active"));
    slides[current].classList.add("active");
}
</script>

</body>
</html>
