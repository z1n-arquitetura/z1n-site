<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide {
  width: 100%;
  height: 100%;
  position: absolute;
  display: none;
  justify-content: center;
  align-items: center;
}

.slide.active {
  display: flex;
}

canvas {
  max-width: 100%;
  max-height: 100%;
}

/* LINKS INVISÍVEIS */
.link {
  position: absolute;
  z-index: 10;
  background: transparent;
}

/* SETAS */
.nav {
  position: absolute;
  bottom: 20px;
  z-index: 20;
  color: white;
  font-size: 32px;
  background: none;
  border: none;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script>
let current = 0;
const slides = document.querySelectorAll('.slide');

function showPage(index) {
  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");
}

function next() {
  current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
}

function prev() {
  current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
}
</script>
