<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">

<title>Z1N Arquiteturas</title>

<!-- Open Graph (WhatsApp preview CORRETO) -->
<meta property="og:title" content="Z1N Arquiteturas">
<meta property="og:description" content="Projetos modernos e exclusivos">
<meta property="og:image" content="https://z1n-arq.com.br/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

/* Container */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Slides */
.slide {
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  display: none;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
}

.slide.active {
  display: flex;
}

/* Canvas */
canvas {
  max-width: 100%;
  max-height: 100%;
  transform-origin: top center;
  display: block;
}

/* WhatsApp botão */
.link {
  position: absolute;
  z-index: 10;
}

/* Setas limpas (sem bolinha) */
.nav {
  position: absolute;
  bottom: 20px;
  z-index: 20;
  background: transparent;
  color: white;
  border: none;
  font-size: 32px;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 20px; }
.next { right: 20px; }

/* Indicador */
.indicator {
  position: absolute;
  top: 15px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<div class="indicator" id="indicator">1 / 1</div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';
const slider = document.getElementById('slider');
const indicator = document.getElementById('indicator');

let current = 0;
let slides = [];

/* ZOOM + PAN */
let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX = 0;
let startY = 0;

/* páginas com zoom liberado (3,4,5) */
const zoomPages = [2, 3, 4];

/* -------- PDF LOAD -------- */
pdfjsLib.getDocument(url).promise.then(pdf => {

  indicator.innerText = `1 / ${pdf.numPages}`;

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      slides.push(slide);

      if (slides.length === 1) slide.classList.add("active");

      page.render({ canvasContext: ctx, viewport });

      /* WhatsApp */
      const wpp = document.createElement('a');
      wpp.href = "https://wa.me/5516991128533";
      wpp.className = "link";

      wpp.style.bottom = "12%";
      wpp.style.left = "50%";
      wpp.style.transform = "translateX(-50%)";
      wpp.style.width = "260px";
      wpp.style.height = "70px";

      slide.appendChild(wpp);

    });

  }

});

/* -------- NAV -------- */
function showPage(index) {
  if (index < 0 || index >= slides.length) return;

  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");

  indicator.innerText = `${current + 1} / ${slides.length}`;

  resetZoom();
}

function next() { showPage(current + 1); }
function prev() { showPage(current - 1); }

/* -------- TRANSFORM -------- */
function applyTransform() {
  const canvas = slides[current].querySelector("canvas");
  if (canvas) {
    canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }
}

/* -------- RESET -------- */
function resetZoom() {
  scale = 1;
  posX = 0;
  posY = 0;
  applyTransform();
}

/* -------- ZOOM DESKTOP -------- */
document.addEventListener("wheel", (e) => {

  if (!zoomPages.includes(current)) return;

  if (e.ctrlKey) {
    e.preventDefault();

    scale += e.deltaY * -0.01;
    scale = Math.min(Math.max(1, scale), 4);

    applyTransform();
  }

}, { passive: false });

/* -------- PAN DESKTOP -------- */
document.addEventListener("mousedown", (e) => {
  if (scale <= 1 || !zoomPages.includes(current)) return;

  isDragging = true;
  startX = e.clientX - posX;
  startY = e.clientY - posY;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  posX = e.clientX - startX;
  posY = e.clientY - startY;

  applyTransform();
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

/* -------- TOUCH -------- */
let initialDistance = null;

document.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1 && scale > 1 && zoomPages.includes(current)) {
    isDragging = true;
    startX = e.touches[0].clientX - posX;
    startY = e.touches[0].clientY - posY;
  }
});

document.addEventListener("touchmove", (e) => {

  if (!zoomPages.includes(current)) return;

  /* PINCH */
  if (e.touches.length === 2) {
    e.preventDefault();

    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (!initialDistance) {
      initialDistance = distance;
    } else {
      scale = distance / initialDistance;
      scale = Math.min(Math.max(1, scale), 4);
      applyTransform();
    }
  }

  /* PAN */
  if (e.touches.length === 1 && isDragging) {
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;
    applyTransform();
  }

}, { passive: false });

document.addEventListener("touchend", () => {
  isDragging = false;
  initialDistance = null;
});
</script>

</body>
</html>
