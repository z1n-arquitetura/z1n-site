<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

.slider {
  display: flex;
  width: 100vw;
  height: 100dvh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.slide {
  flex: none;
  width: 100vw;
  height: 100dvh;
  position: relative;
  scroll-snap-align: start;
}

canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ÁREAS CLICÁVEIS */
.link {
  position: absolute;
  background: rgba(255,0,0,0.25);
  border: 1px dashed #fff;
  cursor: move;
  touch-action: none; /* ESSENCIAL */
  z-index: 10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// DRAG UNIVERSAL (MOUSE + TOUCH)
function ativarDrag(el){
  let down = false, ox = 0, oy = 0;

  function start(e){
    e.preventDefault();
    down = true;

    const t = e.touches ? e.touches[0] : e;
    const rect = el.getBoundingClientRect();

    ox = t.clientX - rect.left;
    oy = t.clientY - rect.top;
  }

  function move(e){
    if(!down) return;

    const t = e.touches ? e.touches[0] : e;
    const p = el.parentElement.getBoundingClientRect();

    let x = (t.clientX - p.left - ox) / p.width * 100;
    let y = (t.clientY - p.top  - oy) / p.height * 100;

    x = Math.max(0, Math.min(100, x));
    y = Math.max(0, Math.min(100, y));

    el.style.left = x + "%";
    el.style.top  = y + "%";
  }

  function end(){
    down = false;
  }

  el.addEventListener("mousedown", start);
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", end);

  el.addEventListener("touchstart", start, { passive:false });
  document.addEventListener("touchmove", move, { passive:false });
  document.addEventListener("touchend", end);
}

const slider = document.getElementById('slider');

pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const v = page.getViewport({scale:2});

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

const ctx = canvas.getContext('2d');

const slide = document.createElement('div');
slide.className="slide";

slide.appendChild(canvas);
slider.appendChild(slide);

page.render({canvasContext:ctx,viewport:v});

// ===== PÁGINA 1 =====
if(i===1){

const tel = document.createElement('a');
tel.href="tel:+5516991128533";
tel.className="link";
tel.style.top="70%";
tel.style.left="40%";
tel.style.width="30%";
tel.style.height="6%";
slide.appendChild(tel);
ativarDrag(tel);

const wpp = document.createElement('a');
wpp.href="https://wa.me/5516991128533";
wpp.className="link";
wpp.style.top="82%";
wpp.style.left="46%";
wpp.style.width="8%";
wpp.style.height="10%";
slide.appendChild(wpp);
ativarDrag(wpp);
}

// ===== PÁGINA 6 =====
if(i===6){

const wpp = document.createElement('a');
wpp.href="https://wa.me/5516991128533";
wpp.className="link";
wpp.style.top="85%";
wpp.style.left="35%";
wpp.style.width="30%";
wpp.style.height="8%";
slide.appendChild(wpp);
ativarDrag(wpp);
}

// ===== PÁGINA 8 =====
if(i===8){

const tel = document.createElement('a');
tel.href="tel:+5516991128533";
tel.className="link";
tel.style.top="70%";
tel.style.left="35%";
tel.style.width="30%";
tel.style.height="6%";
slide.appendChild(tel);
ativarDrag(tel);

const wpp = document.createElement('a');
wpp.href="https://wa.me/5516991128533";
wpp.className="link";
wpp.style.top="82%";
wpp.style.left="46%";
wpp.style.width="8%";
wpp.style.height="10%";
slide.appendChild(wpp);
ativarDrag(wpp);
}

});

}

});
</script>

</body>
</html>
