<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

.slider {
  display: flex;
  width: 100vw;
  height: 100dvh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.slide {
  flex: none;
  width: 100vw;
  height: 100dvh;
  position: relative;
  scroll-snap-align: start;
}

canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* LINKS FINAIS (INVISÍVEIS) */
.link {
  position: absolute;
  background: transparent;
  border: none;
  display: block;
  z-index: 10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const v = page.getViewport({scale:2});

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

const ctx = canvas.getContext('2d');

const slide = document.createElement('div');
slide.className="slide";

slide.appendChild(canvas);
slider.appendChild(slide);

page.render({canvasContext:ctx,viewport:v});

// FUNÇÃO LINK FINAL
function link(href, top, left, width, height){
  const el = document.createElement('a');
  el.href = href;
  el.className = "link";
  el.style.top = top;
  el.style.left = left;
  el.style.width = width;
  el.style.height = height;
  slide.appendChild(el);
}

// ===== PÁGINA 1 =====
if(i===1){
  link("tel:+5516991128533","74%","38%","32%","6%");
  link("https://wa.me/5516991128533","85%","46%","8%","10%");
}

// ===== PÁGINA 6 =====
if(i===6){
  link("https://wa.me/5516991128533","87%","34%","32%","8%");
}

// ===== PÁGINA 8 =====
if(i===8){
  link("tel:+5516991128533","72%","34%","32%","6%");
  link("https://wa.me/5516991128533","84%","46%","8%","10%");
}

});

}

});
</script>

</body>
</html>
