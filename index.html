<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .link {
            position: absolute;
            z-index: 9999;
            border: 3px solid red;
            background: rgba(255, 0, 0, 0.25);
            pointer-events: all;
            cursor: pointer;
        }

        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>

    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'https://z1n-arq.com.br/portfolio.pdf';

        const slider = document.getElementById('slider');
        let slides = [];
        let current = 0;

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log("✅ PDF carregado com", pdf.numPages, "páginas");

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;
                    const viewportBase = page.getViewport({ scale: 1.0 });

                    // Scale dinâmico para caber na tela
                    const scale = Math.min(
                        (window.innerWidth * 0.96) / viewportBase.width,
                        (window.innerHeight * 0.92) / viewportBase.height
                    );

                    const viewport = page.getViewport({ scale: scale });

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);
                    slides.push(slide);

                    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                        createLinks(wrapper, pageIndex, viewportBase);

                        if (slides.length === 1) slide.classList.add("active");
                    });
                });
            }
        }).catch(err => {
            console.error("Erro PDF:", err);
            alert("Erro ao carregar o PDF.");
        });

        function createLinks(wrapper, pageIndex, viewportBase) {
            let configs = [];

            if (pageIndex === 1) {
                configs = [
                    { href: "https://wa.me/5516991128533", x: 1050, y: 680, w: 190, h: 130 },
                    { href: "tel:+5516991128533", x: 1220, y: 740, w: 510, h: 95 }
                ];
            } else if (pageIndex === 6) {
                configs = [
                    { href: "https://wa.me/5516991128533", x: 1050, y: 870, w: 190, h: 130 },
                    { href: "tel:+5516991128533", x: 1220, y: 915, w: 490, h: 105 }
                ];
            } else if (pageIndex === slides.length) {
                configs = [
                    { href: "https://wa.me/5516991128533", x: 1280, y: 790, w: 170, h: 125 },
                    { href: "tel:+5516991128533", x: 1060, y: 650, w: 610, h: 165 }
                ];
            }

            configs.forEach(data => {
                const link = document.createElement('a');
                link.href = data.href;
                link.target = '_blank';
                link.className = 'link';

                // Posição em porcentagem baseada no tamanho ORIGINAL do PDF
                const left = (data.x / viewportBase.width) * 100;
                const top = (data.y / viewportBase.height) * 100;
                const width = (data.w / viewportBase.width) * 100;
                const height = (data.h / viewportBase.height) * 100;

                link.style.left = left + '%';
                link.style.top = top + '%';
                link.style.width = width + '%';
                link.style.height = height + '%';

                wrapper.appendChild(link);
            });
        }

        function showPage(index) {
            slides.forEach(s => s.classList.remove("active"));
            if (slides[index]) slides[index].classList.add("active");
            current = index;
        }

        function next() {
            current = (current + 1) % slides.length;
            showPage(current);
        }

        function prev() {
            current = (current - 1 + slides.length) % slides.length;
            showPage(current);
        }

        // Recarrega ao redimensionar (importante para mobile)
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
