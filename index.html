<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.slider{
  display:flex;
  width:100vw;
  height:100vh;
  transition: transform .32s ease;
}

.slide{
  min-width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.frame{
  position:relative;
  margin:auto;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  width:100%;
  height:100%;
}

/* LINKS VISUAIS */
.link{
  position:absolute;
  background:rgba(255,0,0,0.2);
  border:2px solid #fff;
  cursor:move;
}

/* BOTÃO SALVAR */
#saveBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
  padding:10px 15px;
  background:#fff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<button id="saveBtn">SALVAR POSIÇÕES</button>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');
const saveBtn = document.getElementById('saveBtn');

let linksData = [];

pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const v = page.getViewport({scale:2});

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

const ctx = canvas.getContext('2d');

const slide = document.createElement('div');
slide.className="slide";

const frame = document.createElement('div');
frame.className="frame";
frame.style.aspectRatio = `${v.width} / ${v.height}`;

frame.appendChild(canvas);
slide.appendChild(frame);
slider.appendChild(slide);

page.render({canvasContext:ctx,viewport:v});

// ===== CRIAR LINK EDITÁVEL =====
function createLink(href, top, left, width, height){

const el = document.createElement('a');
el.href = href;
el.className="link";

el.style.top = top;
el.style.left = left;
el.style.width = width;
el.style.height = height;

frame.appendChild(el);

// ===== DRAG =====
let dragging = false;

el.addEventListener("mousedown", ()=>{
  dragging = true;
});

document.addEventListener("mouseup", ()=>{
  dragging = false;
});

document.addEventListener("mousemove", (e)=>{
  if(!dragging) return;

  const rect = frame.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  el.style.left = (x / rect.width)*100 + "%";
  el.style.top = (y / rect.height)*100 + "%";
});

// ===== SALVAR REFERÊNCIA =====
linksData.push({
  page:i,
  el:el,
  href:href
});

}

// ===== LINKS INICIAIS =====
if(i===1){
  createLink("tel:+5516991128533","76%","36%","34%","6%");
  createLink("https://wa.me/5516991128533","85%","32%","36%","8%");
}

if(i===6){
  createLink("https://wa.me/5516991128533","89%","32%","36%","8%");
}

if(i===8){
  createLink("tel:+5516991128533","70%","32%","36%","6%");
  createLink("https://wa.me/5516991128533","82%","44%","12%","10%");
}

});

}

});

// ===== BOTÃO SALVAR =====
saveBtn.addEventListener("click", ()=>{

let output = "";

linksData.forEach(item=>{

const el = item.el;

output += `\nif(i===${item.page}){\n`;
output += `  link("${item.href}","${el.style.top}","${el.style.left}","${el.style.width}","${el.style.height}");\n`;
output += `}\n`;

});

console.log(output);
alert("Posições copiadas! Aperte F12 e copie do console.");

});
</script>

</body>
</html>
