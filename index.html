<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>
    <meta property="og:title" content="Z1N Arquiteturas">
    <meta property="og:description" content="Projetos exclusivos">
    <meta property="og:image" content="https://z1n-arquitetura.github.io/z1n-site/og-image.jpg">
    <meta property="og:url" content="https://z1n-arquitetura.github.io/z1n-site/">
    <meta property="og:type" content="website">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: relative; /* importante */
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }
        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        .link {
            position: absolute;
            z-index: 10000;
            background: rgba(255, 0, 0, 0.25); /* vermelho para debug - mude depois */
            border: 3px solid red;
            pointer-events: all;
            cursor: pointer;
            transition: all 0.2s;
        }
        .link:hover {
            background: rgba(0, 255, 0, 0.25);
            border-color: lime;
        }
        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>
    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let current = 0;
        let slides = [];

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log(`PDF carregado: ${pdf.numPages} páginas`);

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.appendChild(canvas);
                    slider.appendChild(slide);
                    slides.push(slide);

                    // Renderiza o PDF
                    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                        const pageIndex = i;

                        // === LINKS AJUSTADOS ===
                        if (pageIndex === 1) {
                            // WhatsApp (área maior)
                            createLink(slide, "https://wa.me/5516991128533", 1020, 670, 250, 190);
                            // Telefone / Botão "Solicitar análise"
                            createLink(slide, "tel:+5516991128533", 1110, 715, 590, 180);
                        }

                        if (pageIndex === 6) {
                            createLink(slide, "https://wa.me/5516991128533", 1050, 840, 240, 190);
                            createLink(slide, "tel:+5516991128533", 1140, 885, 590, 180);
                        }

                        if (pageIndex === pdf.numPages) {
                            createLink(slide, "https://wa.me/5516991128533", 1350, 780, 180, 150);
                            createLink(slide, "tel:+5516991128533", 1090, 610, 690, 230);
                        }
                    });

                    if (slides.length === 1) slide.classList.add("active");
                });
            }
        }).catch(err => {
            console.error("Erro ao carregar PDF:", err);
        });

        // Função createLink melhorada
        function createLink(slide, href, x, y, w, h) {
            const link = document.createElement('a');
            link.href = href;
            link.className = 'link';
            link.target = '_blank';
            link.rel = 'noopener';

            const canvas = slide.querySelector('canvas');

            // Usa MutationObserver para esperar o canvas estar pronto
            const observer = new MutationObserver(() => {
                if (canvas.width > 800 && canvas.height > 800) {
                    observer.disconnect();
                    applyLinkPosition();
                }
            });

            observer.observe(canvas, { attributes: true, attributeFilter: ['width', 'height'] });

            // Fallback
            function applyLinkPosition() {
                const percentX = (x / canvas.width) * 100;
                const percentY = (y / canvas.height) * 100;
                const percentW = (w / canvas.width) * 100;
                const percentH = (h / canvas.height) * 100;

                link.style.left = percentX + '%';
                link.style.top = percentY + '%';
                link.style.width = percentW + '%';
                link.style.height = percentH + '%';

                slide.appendChild(link);
                console.log(`✅ Link criado - Página ${slides.indexOf(slide) + 1} | ${percentX.toFixed(1)}% x ${percentY.toFixed(1)}%`);
            }

            // Executa com delay caso o observer não capture
            setTimeout(() => {
                if (!link.parentNode && canvas.width > 800) {
                    applyLinkPosition();
                }
            }, 400);
        }

        function showPage(index) {
            if (slides[current]) slides[current].classList.remove("active");
            current = index;
            if (slides[current]) slides[current].classList.add("active");
        }

        function next() {
            current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
        }

        function prev() {
            current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
        }
    </script>
</body>
</html>
