<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas - Editor de Links</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        .slider { width: 100vw; height: 100vh; position: relative; }
        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }
        canvas { max-width: 100%; max-height: 100%; display: block; }

        .link {
            position: absolute;
            z-index: 10000;
            background: rgba(255, 0, 0, 0.4);
            border: 3px dashed red;
            cursor: move;
            color: white;
            font-size: 14px;
            padding: 6px 10px;
            text-align: center;
        }
        .resize-handle {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            background: red;
            border: 2px solid white;
            cursor: nwse-resize;
            border-radius: 50%;
        }

        /* Botão Salvar */
        .save-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 99999;
            background: #00ff00;
            color: black;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Caixa que vai aparecer com o código */
        #result-box {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: #111;
            color: #0f0;
            border: 3px solid #0f0;
            padding: 20px;
            border-radius: 10px;
            z-index: 999999;
            display: none;
            font-family: monospace;
            font-size: 15px;
            max-height: 70vh;
            overflow: auto;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: red;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>
    <button class="save-btn" onclick="savePositions()">💾 SALVAR POSIÇÕES</button>

    <!-- Caixa de resultado -->
    <div id="result-box">
        <button class="close-btn" onclick="closeResult()">Fechar</button>
        <pre id="code-output"></pre>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let current = 0;
        let slides = [];
        let allLinks = [];

        // ==================== Carregamento do PDF (mesmo de antes) ====================
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log(`✅ PDF carregado com ${pdf.numPages} páginas`);

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.appendChild(canvas);
                    slider.appendChild(slide);
                    slides.push(slide);

                    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                        const pageIndex = i;

                        if (pageIndex === 1) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1020, 670, 250, 190, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1110, 715, 590, 180, "Telefone", pageIndex);
                        }
                        if (pageIndex === 6) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1050, 840, 240, 190, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1140, 885, 590, 180, "Telefone", pageIndex);
                        }
                        if (pageIndex === pdf.numPages) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1350, 780, 180, 150, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1090, 610, 690, 230, "Telefone", pageIndex);
                        }
                    });

                    if (slides.length === 1) slide.classList.add("active");
                });
            }
        }).catch(err => console.error("Erro:", err));

        function createDraggableLink(slide, href, x, y, w, h, label, pageNum) {
            const link = document.createElement('a');
            link.href = href;
            link.className = 'link';
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = label;

            const canvas = slide.querySelector('canvas');

            function updatePosition(px, py, pw, ph) {
                link.style.left = px + '%';
                link.style.top = py + '%';
                link.style.width = pw + '%';
                link.style.height = ph + '%';
            }

            updatePosition((x/canvas.width)*100, (y/canvas.height)*100, (w/canvas.width)*100, (h/canvas.height)*100);

            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            link.appendChild(resizeHandle);

            makeDraggableAndResizable(link, resizeHandle, canvas, (newX, newY, newW, newH) => {
                const pX = (newX / canvas.width) * 100;
                const pY = (newY / canvas.height) * 100;
                const pW = (newW / canvas.width) * 100;
                const pH = (newH / canvas.height) * 100;
                updatePosition(pX, pY, pW, pH);
            });

            link.addEventListener('dblclick', () => {
                let curX = parseFloat(link.style.left) || 0;
                let curY = parseFloat(link.style.top) || 0;
                let curW = parseFloat(link.style.width) || 0;
                let curH = parseFloat(link.style.height) || 0;

                let nx = prompt("X (%):", curX.toFixed(1));
                let ny = prompt("Y (%):", curY.toFixed(1));
                let nw = prompt("Largura (%):", curW.toFixed(1));
                let nh = prompt("Altura (%):", curH.toFixed(1));

                if (nx && ny && nw && nh) updatePosition(parseFloat(nx), parseFloat(ny), parseFloat(nw), parseFloat(nh));
            });

            slide.appendChild(link);
            allLinks.push({link, canvas, href, label, pageNum});
        }

        function makeDraggableAndResizable(el, handle, canvas, callback) {
            let dragging = false, resizing = false;
            let startMouseX, startMouseY, startPercentX, startPercentY, startPercentW, startPercentH;

            el.addEventListener('mousedown', e => {
                startMouseX = e.clientX;
                startMouseY = e.clientY;
                startPercentX = parseFloat(el.style.left) || 0;
                startPercentY = parseFloat(el.style.top) || 0;
                startPercentW = parseFloat(el.style.width) || 0;
                startPercentH = parseFloat(el.style.height) || 0;

                if (e.target === handle) resizing = true;
                else dragging = true;
            });

            document.addEventListener('mousemove', e => {
                if (!dragging && !resizing) return;
                const rect = canvas.getBoundingClientRect();
                const dx = ((e.clientX - startMouseX) / rect.width) * 100;
                const dy = ((e.clientY - startMouseY) / rect.height) * 100;

                if (dragging) {
                    callback((startPercentX + dx)/100 * canvas.width, (startPercentY + dy)/100 * canvas.height,
                             (startPercentW / 100) * canvas.width, (startPercentH / 100) * canvas.height);
                } else if (resizing) {
                    const newW = Math.max(80, (startPercentW + dx)/100 * canvas.width);
                    const newH = Math.max(40, (startPercentH + dy)/100 * canvas.height);
                    callback((startPercentX / 100)*canvas.width, (startPercentY / 100)*canvas.height, newW, newH);
                }
            });

            document.addEventListener('mouseup', () => { dragging = false; resizing = false; });
        }

        // ===================== SALVAR =====================
        function savePositions() {
            if (allLinks.length === 0) {
                alert("Nenhum link encontrado.");
                return;
            }

            let output = "// === POSIÇÕES AJUSTADAS - COLE ESTE CÓDIGO NA VERSÃO FINAL ===\n\n";

            allLinks.forEach(item => {
                const style = item.link.style;
                const canvas = item.canvas;
                const x = Math.round((parseFloat(style.left)/100) * canvas.width);
                const y = Math.round((parseFloat(style.top)/100) * canvas.height);
                const w = Math.round((parseFloat(style.width)/100) * canvas.width);
                const h = Math.round((parseFloat(style.height)/100) * canvas.height);

                output += `// Página ${item.pageNum} - ${item.label}\n`;
                output += `createLink(slide, "${item.href}", ${x}, ${y}, ${w}, ${h});\n\n`;
            });

            document.getElementById('code-output').textContent = output;
            document.getElementById('result-box').style.display = 'block';
        }

        function closeResult() {
            document.getElementById('result-box').style.display = 'none';
        }

        function showPage(index) {
            if (slides[current]) slides[current].classList.remove("active");
            current = index;
            if (slides[current]) slides[current].classList.add("active");
        }

        function next() { current >= slides.length - 1 ? showPage(0) : showPage(current + 1); }
        function prev() { current <= 0 ? showPage(slides.length - 1) : showPage(current - 1); }
    </script>
</body>
</html>
