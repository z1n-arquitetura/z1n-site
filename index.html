<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z1N Arquiteturas</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  touch-action:pan-y;
}

/* fullscreen real */
.swiper{
  width:100%;
  height:100dvh;
}

.swiper-slide{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* canvas perfeito */
canvas{
  display:block;
  max-width:100%;
  max-height:100%;
}

/* overlay */
.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

.link{
  position:absolute;
  pointer-events:auto;
}

/* melhora render */
.swiper-slide{
  will-change:transform;
}

</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper" id="wrapper"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const wrapper = document.getElementById('wrapper');

const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  loop: false,
  resistanceRatio: 0.85,
  speed: 350,
  preloadImages:false,
  watchSlidesProgress:true,
  lazy:false
});

// otimiza render
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

const slides = [];

for(let i=1;i<=pdf.numPages;i++){

  const slide = document.createElement('div');
  slide.className = "swiper-slide";

  const canvas = document.createElement('canvas');
  slide.appendChild(canvas);

  const overlay = document.createElement('div');
  overlay.className = "overlay";
  slide.appendChild(overlay);

  wrapper.appendChild(slide);

  slides.push({
    canvas,
    overlay,
    rendered:false
  });
}

swiper.update();

function renderPage(i){

  if(!slides[i]) return;
  if(slides[i].rendered) return;

  slides[i].rendered = true;

  pdf.getPage(i+1).then(page=>{

    const viewport = page.getViewport({scale:2});
    const canvas = slides[i].canvas;
    const ctx = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const ratio = Math.min(
      window.innerWidth / viewport.width,
      window.innerHeight / viewport.height
    );

    const width = viewport.width * ratio;
    const height = viewport.height * ratio;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    slides[i].overlay.style.width = width + "px";
    slides[i].overlay.style.height = height + "px";

    page.render({
      canvasContext:ctx,
      viewport
    });

    function link(href, top, left, width, height){
      const el = document.createElement('a');
      el.href = href;
      el.className = "link";

      if(href.includes("wa.me")) el.target="_blank";

      el.style.top = top;
      el.style.left = left;
      el.style.width = width;
      el.style.height = height;

      slides[i].overlay.appendChild(el);
    }

    const pageNum = i+1;

    if(pageNum===1){
      link("tel:+5516991128533","76%","36%","34%","6%");
      link("https://wa.me/5516991128533","85%","32%","36%","8%");
    }

    if(pageNum===6){
      link("https://wa.me/5516991128533","89%","32%","36%","8%");
    }

    if(pageNum===8){
      link("tel:+5516991128533","70%","32%","36%","6%");
      link("https://wa.me/5516991128533","82%","44%","12%","10%");
    }

  });
}

// render inicial
renderPage(0);
renderPage(1);
renderPage(2);

// lazy load inteligente
swiper.on('slideChange', ()=>{

  const i = swiper.activeIndex;

  renderPage(i);
  renderPage(i+1);
  renderPage(i+2);
  renderPage(i-1);

});

// corrigir resize (muito importante)
window.addEventListener('resize', ()=>{
  location.reload();
});

});
</script>

</body>
</html>
