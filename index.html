<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas - Editor de Links</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }
        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        .link {
            position: absolute;
            z-index: 10000;
            background: rgba(255, 0, 0, 0.4);
            border: 3px dashed red;
            cursor: move;
            color: white;
            font-size: 14px;
            padding: 6px 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
            pointer-events: all;
        }
        .link:hover { background: rgba(255, 0, 0, 0.55); }
        .resize-handle {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            background: red;
            border: 2px solid white;
            cursor: nwse-resize;
            border-radius: 50%;
        }
        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>
    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let current = 0;
        let slides = [];

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log(`✅ PDF carregado com ${pdf.numPages} páginas`);

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.appendChild(canvas);
                    slider.appendChild(slide);
                    slides.push(slide);

                    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                        const pageIndex = i;

                        if (pageIndex === 1) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1020, 670, 250, 190, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1110, 715, 590, 180, "Telefone", pageIndex);
                        }
                        if (pageIndex === 6) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1050, 840, 240, 190, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1140, 885, 590, 180, "Telefone", pageIndex);
                        }
                        if (pageIndex === pdf.numPages) {
                            createDraggableLink(slide, "https://wa.me/5516991128533", 1350, 780, 180, 150, "WhatsApp", pageIndex);
                            createDraggableLink(slide, "tel:+5516991128533", 1090, 610, 690, 230, "Telefone", pageIndex);
                        }
                    });

                    if (slides.length === 1) slide.classList.add("active");
                });
            }
        }).catch(err => console.error("Erro ao carregar PDF:", err));

        function createDraggableLink(slide, href, x, y, w, h, label, pageNum) {
            const link = document.createElement('a');
            link.href = href;
            link.className = 'link';
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = label;

            const canvas = slide.querySelector('canvas');

            function updatePosition(percentX, percentY, percentW, percentH) {
                link.style.left = percentX + '%';
                link.style.top = percentY + '%';
                link.style.width = percentW + '%';
                link.style.height = percentH + '%';
            }

            // Posição inicial em porcentagem
            updatePosition(
                (x / canvas.width) * 100,
                (y / canvas.height) * 100,
                (w / canvas.width) * 100,
                (h / canvas.height) * 100
            );

            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            link.appendChild(resizeHandle);

            makeDraggableAndResizable(link, resizeHandle, canvas, (newX, newY, newW, newH) => {
                const pX = (newX / canvas.width) * 100;
                const pY = (newY / canvas.height) * 100;
                const pW = (newW / canvas.width) * 100;
                const pH = (newH / canvas.height) * 100;

                updatePosition(pX, pY, pW, pH);

                console.log(`%c📍 Página ${pageNum} — ${label}`, 'color:lime; font-weight:bold; font-size:15px');
                console.log(`createLink(slide, "${href}", ${Math.round(newX)}, ${Math.round(newY)}, ${Math.round(newW)}, ${Math.round(newH)});`);
            });

            // Duplo clique para editar valores manualmente
            link.addEventListener('dblclick', (e) => {
                e.preventDefault();
                const curX = parseFloat(link.style.left) || 0;
                const curY = parseFloat(link.style.top) || 0;
                const curW = parseFloat(link.style.width) || 0;
                const curH = parseFloat(link.style.height) || 0;

                const nx = prompt("X (%) :", curX.toFixed(1));
                const ny = prompt("Y (%) :", curY.toFixed(1));
                const nw = prompt("Largura (%) :", curW.toFixed(1));
                const nh = prompt("Altura (%) :", curH.toFixed(1));

                if (nx !== null && ny !== null && nw !== null && nh !== null) {
                    updatePosition(parseFloat(nx), parseFloat(ny), parseFloat(nw), parseFloat(nh));
                }
            });

            slide.appendChild(link);
        }

        function makeDraggableAndResizable(el, handle, canvas, callback) {
            let dragging = false, resizing = false;
            let startMouseX, startMouseY, startPercentX, startPercentY, startPercentW, startPercentH;

            el.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                startMouseX = e.clientX;
                startMouseY = e.clientY;

                startPercentX = parseFloat(el.style.left) || 0;
                startPercentY = parseFloat(el.style.top) || 0;
                startPercentW = parseFloat(el.style.width) || 0;
                startPercentH = parseFloat(el.style.height) || 0;

                if (e.target === handle) {
                    resizing = true;
                } else {
                    dragging = true;
                }
            });

            document.addEventListener('mousemove', e => {
                if (!dragging && !resizing) return;

                const canvasRect = canvas.getBoundingClientRect();
                const dxPercent = ((e.clientX - startMouseX) / canvasRect.width) * 100;
                const dyPercent = ((e.clientY - startMouseY) / canvasRect.height) * 100;

                if (dragging) {
                    const newX = startPercentX + dxPercent;
                    const newY = startPercentY + dyPercent;
                    callback(
                        (newX / 100) * canvas.width,
                        (newY / 100) * canvas.height,
                        (startPercentW / 100) * canvas.width,
                        (startPercentH / 100) * canvas.height
                    );
                } else if (resizing) {
                    const newW = Math.max(80, (startPercentW + dxPercent) / 100 * canvas.width);
                    const newH = Math.max(40, (startPercentH + dyPercent) / 100 * canvas.height);
                    callback(
                        (startPercentX / 100) * canvas.width,
                        (startPercentY / 100) * canvas.height,
                        newW, newH
                    );
                }
            });

            document.addEventListener('mouseup', () => {
                dragging = false;
                resizing = false;
            });
        }

        function showPage(index) {
            if (slides[current]) slides[current].classList.remove("active");
            current = index;
            if (slides[current]) slides[current].classList.add("active");
        }

        function next() {
            current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
        }

        function prev() {
            current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
        }
    </script>
</body>
</html>
