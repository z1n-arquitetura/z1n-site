<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* SLIDER CONTROLADO (SEM SCROLL NATIVO) */
.slider{
  display:flex;
  width:100vw;
  height:100dvh;
  will-change: transform;
  transition: transform .32s ease;
  touch-action: pan-y; /* evita conflito com vertical */
}

.slide{
  min-width:100vw;
  height:100dvh;
  position:relative;
}

canvas{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* LINKS */
.link{
  position:absolute;
  background:transparent;
  z-index:10;
}

/* DEBUG opcional: ative se quiser ver caixas
.link{ background:rgba(255,0,0,.2); border:1px dashed #fff; }
*/
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

let index = 0;
let startX = 0;
let isDown = false;

// ===== SWIPE COM LIMIAR (ANTI "PULAR PÁGINAS") =====
function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

function onStart(x){
  startX = x;
  isDown = true;
}

function onEnd(x){
  if(!isDown) return;
  isDown = false;

  const diff = startX - x;

  // LIMIAR MAIOR = MENOS SENSÍVEL (ajustado)
  const threshold = 80;

  if(Math.abs(diff) > threshold){
    if(diff > 0) goTo(index + 1);
    else goTo(index - 1);
  }else{
    goTo(index); // volta para a página atual
  }
}

// touch
document.addEventListener("touchstart", e=>{
  onStart(e.touches[0].clientX);
}, {passive:true});

document.addEventListener("touchend", e=>{
  onEnd(e.changedTouches[0].clientX);
});

// mouse
document.addEventListener("mousedown", e=>{
  onStart(e.clientX);
});
document.addEventListener("mouseup", e=>{
  onEnd(e.clientX);
});

// ===== PDF =====
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const v = page.getViewport({scale:2});

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

const ctx = canvas.getContext('2d');

const slide = document.createElement('div');
slide.className="slide";

slide.appendChild(canvas);
slider.appendChild(slide);

page.render({canvasContext:ctx,viewport:v});

// ===== FUNÇÃO LINK =====
function link(href, top, left, width, height){
  const el = document.createElement('a');

  el.href = href;

  if(href.includes("wa.me")){
    el.target = "_blank";
    el.rel = "noopener";
  }

  el.className="link";

  // POSIÇÃO DIRETA (SEM CALC)
  el.style.top = top;
  el.style.left = left;
  el.style.width = width;
  el.style.height = height;

  // BLOQUEIA DUPLO CLIQUE (SWIPE vs CLICK)
  let moved = false;

  el.addEventListener("touchstart", () => {
    moved = false;
  });

  el.addEventListener("touchmove", () => {
    moved = true;
  });

  el.addEventListener("click", (e) => {
    if(moved){
      e.preventDefault();
    }
  });

  slide.appendChild(el);
}

// ===== POSIÇÕES AJUSTADAS =====

// PÁGINA 1
if(i===1){
  link("tel:+5516991128533","76%","36%","34%","6%");
  link("https://wa.me/5516991128533","87%","45%","10%","10%");
}

// PÁGINA 6
if(i===6){
  link("https://wa.me/5516991128533","89%","32%","36%","8%");
}

// PÁGINA 8
if(i===8){
  link("tel:+5516991128533","74%","32%","36%","6%");
  link("https://wa.me/5516991128533","86%","44%","12%","10%");
}

});

}

});
</script>

</body>
</html>
