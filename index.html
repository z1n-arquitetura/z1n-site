<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide {
  width: 100%;
  height: 100%;
  position: absolute;
  display: none;
  justify-content: center;
  align-items: center;
}

.slide.active {
  display: flex;
}

canvas {
  max-width: 100%;
  max-height: 100%;
}

/* 🔥 CAIXAS GARANTIDAS */
.link {
  position: absolute;
  z-index: 99999;

  border: 4px solid yellow;
  background: rgba(255,255,0,0.5);

  width: 120px;
  height: 120px;

  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  cursor: move;
}

.link.wpp {
  border-color: red;
  background: rgba(255,0,0,0.5);
}

/* HANDLE */
.handle {
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  right: -10px;
  bottom: -10px;
  cursor: nwse-resize;
}

/* NAV */
.nav {
  position: absolute;
  bottom: 20px;
  z-index: 99999;
  color: white;
  font-size: 32px;
  background: none;
  border: none;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<body>

<div class="slider" id="slider"></div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';
const slider = document.getElementById('slider');

let current = 0;
let slides = [];

pdfjsLib.getDocument(url).promise.then(pdf => {

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      slides.push(slide);
      if (slides.length === 1) slide.classList.add("active");

      page.render({ canvasContext: ctx, viewport });

      const pageIndex = i;

      /* PÁGINA 1 */
      if (pageIndex === 1) {
        createLink(slide, "wpp", "https://wa.me/5516991128533");
        createLink(slide, "tel", "tel:+5516991128533");
      }

      /* PÁGINA 6 */
      if (pageIndex === 6) {
        createLink(slide, "wpp", "https://wa.me/5516991128533");
        createLink(slide, "tel", "tel:+5516991128533");
      }

      /* ÚLTIMA */
      if (pageIndex === pdf.numPages) {
        createLink(slide, "wpp", "https://wa.me/5516991128533");
        createLink(slide, "tel", "tel:+5516991128533");
      }

    });

  }

});

/* CRIAR LINK SEM POSIÇÃO */
function createLink(slide, type, href) {

  const link = document.createElement('a');
  link.href = href;
  link.className = 'link ' + type;

  const handle = document.createElement('div');
  handle.className = 'handle';
  link.appendChild(handle);

  slide.appendChild(link);

  makeDraggable(link);
  makeResizable(link, handle);
}

/* DRAG */
function makeDraggable(el) {
  let isDown = false, offsetX, offsetY;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains("handle")) return;

    isDown = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (!isDown) return;

    el.style.left = (e.clientX - offsetX) + 'px';
    el.style.top = (e.clientY - offsetY) + 'px';
    el.style.transform = "none";
  });

  document.addEventListener('mouseup', () => {
    isDown = false;
  });
}

/* RESIZE */
function makeResizable(el, handle) {
  let isResizing = false;

  handle.addEventListener('mousedown', e => {
    e.stopPropagation();
    isResizing = true;
  });

  document.addEventListener('mousemove', e => {
    if (!isResizing) return;

    el.style.width = (e.clientX - el.offsetLeft) + 'px';
    el.style.height = (e.clientY - el.offsetTop) + 'px';
  });

  document.addEventListener('mouseup', () => {
    isResizing = false;
  });
}

/* NAV */
function showPage(index) {
  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");
}

function next() {
  current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
}

function prev() {
  current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
}
</script>

</body>
</html>
