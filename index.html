<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.slider{
  display:flex;
  height:100vh;
  transition: transform .3s ease;
}

.slide{
  min-width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.frame{
  position:relative;
  max-width:100vw;
  max-height:100vh;
}

canvas{
  width:100%;
  height:auto;
}

.link{
  position:absolute;
  background:rgba(255,0,0,0.2);
  border:2px solid #fff;
  cursor:move;
}

.handle{
  width:10px;
  height:10px;
  background:#fff;
  position:absolute;
  right:-5px;
  bottom:-5px;
  cursor:nwse-resize;
}

#saveBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
  padding:10px;
  background:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<button id="saveBtn">SALVAR POSIÇÕES</button>
<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');
const saveBtn = document.getElementById('saveBtn');

let index = 0;
let startX = 0;
let isDown = false;
let linksData = [];

// ===== NAVEGAÇÃO =====
function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

// mouse (corrigido)
document.addEventListener("mousedown", e=>{
  if(e.target.closest('.link')) return;
  startX = e.clientX;
  isDown = true;
});

document.addEventListener("mouseup", e=>{
  if(!isDown) return;

  if(e.target.closest('.link')){
    isDown = false;
    return;
  }

  isDown = false;

  const diff = startX - e.clientX;

  if(Math.abs(diff) > 80){
    if(diff > 0) goTo(index+1);
    else goTo(index-1);
  }
});

// touch
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  const diff = startX - e.changedTouches[0].clientX;
  if(Math.abs(diff) > 80){
    if(diff > 0) goTo(index+1);
    else goTo(index-1);
  }
});

// teclado
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowRight") goTo(index+1);
  if(e.key === "ArrowLeft") goTo(index-1);
});

// ===== PDF =====
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

slider.style.width = (pdf.numPages * 100) + "vw";

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const containerWidth = window.innerWidth * 0.95;
const viewport = page.getViewport({ scale: 1 });

const scale = containerWidth / viewport.width;

const v = page.getViewport({ scale: scale });
const slide = document.createElement('div');
slide.className="slide";

const frame = document.createElement('div');
frame.className="frame";

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

frame.appendChild(canvas);
slide.appendChild(frame);
slider.appendChild(slide);

page.render({canvasContext:canvas.getContext('2d'),viewport:v});

// ===== FUNÇÃO LINK =====
function createLink(page, top, left, width, height){

const el = document.createElement('div');
el.className="link";

el.style.top = top;
el.style.left = left;
el.style.width = width;
el.style.height = height;

const handle = document.createElement('div');
handle.className="handle";
el.appendChild(handle);

frame.appendChild(el);

let dragging=false, resizing=false;

el.addEventListener("mousedown", e=>{
  if(e.target === handle) return;
  dragging=true;
});

handle.addEventListener("mousedown", e=>{
  resizing=true;
  e.stopPropagation();
});

document.addEventListener("mouseup", ()=>{
  dragging=false;
  resizing=false;
});

document.addEventListener("mousemove", e=>{

const rect = frame.getBoundingClientRect();

if(dragging){
  el.style.left = ((e.clientX - rect.left)/rect.width)*100 + "%";
  el.style.top = ((e.clientY - rect.top)/rect.height)*100 + "%";
}

if(resizing){
  const left = parseFloat(el.style.left);
  const top = parseFloat(el.style.top);

  el.style.width = ((e.clientX - rect.left)/rect.width)*100 - left + "%";
  el.style.height = ((e.clientY - rect.top)/rect.height)*100 - top + "%";
}

});

linksData.push({page,el});
}

// ===== CAIXAS =====
if(i===1){
  createLink(i,"76%","36%","34%","6%");
  createLink(i,"85%","32%","36%","8%");
}

if(i===6){
  createLink(i,"89%","32%","36%","8%");
}

if(i===8){
  createLink(i,"70%","32%","36%","6%");
  createLink(i,"82%","44%","12%","10%");
}

});

}

});

// ===== SALVAR =====
saveBtn.onclick = ()=>{

let output = "";

linksData.forEach(item=>{
const el = item.el;

output += `
if(i===${item.page}){
  link("COLOQUE_LINK_AQUI","${el.style.top}","${el.style.left}","${el.style.width}","${el.style.height}");
}
`;
});

console.log(output);
alert("Copie do console (F12)");
};
</script>

</body>
</html>
