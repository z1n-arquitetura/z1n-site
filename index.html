<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N | Portfólio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* SETAS MÍNIMAS (5mm) NOS CANTOS EXTREMOS */
        .seta {
            position: fixed;
            bottom: 10px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px; 
            cursor: pointer;
            padding: 15px;
        }
        #prev { left: 5px; }
        #next { right: 5px; }

        /* MODO DE EDIÇÃO: CAMPOS VISÍVEIS */
        .link-invisivel {
            position: absolute;
            display: block;
            z-index: 999;
            /*--- AJUSTE VISUAL ---*/
            background: rgba(255, 255, 0, 0.4); /* AMARELO PARA VISUALIZAR */
            border: 1px solid yellow;
            /*----------------------*/
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <img src="p1.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" 
                   style="width: 200px; height: 80px; top: 70%; left: 50%; transform: translateX(-50%);">
                </a>
            </div>

            <div class="swiper-slide"><img src="p2.png"></div>
            <div class="swiper-slide"><img src="p3.png"></div>
            <div class="swiper-slide"><img src="p4.png"></div>
            <div class="swiper-slide"><img src="p5.png"></div>

            <div class="swiper-slide">
                <img src="p6.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" 
                   style="width: 180px; height: 60px; top: 60%; left: 45%;">
                </a>
            </div>

            <div class="swiper-slide"><img src="p7.png"></div>

            <div class="swiper-slide">
                <img src="p8.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" 
                   style="width: 150px; height: 50px; top: 80%; left: 25%;">
                </a>
                <a href="tel:+55NUMERO" class="link-invisivel" 
                   style="width: 150px; height: 50px; top: 80%; left: 55%;">
                </a>
            </div>

        </div>
    </div>

    <div class="seta" id="prev">&#10094;</div>
    <div class="seta" id="next">&#10095;</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            grabCursor: true,
            mousewheel: true,
            keyboard: true,
            navigation: { nextEl: '#next', prevEl: '#prev' },
        });
    </script>
</body>
</html>
