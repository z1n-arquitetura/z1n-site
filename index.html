<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N arquiteturas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* SETAS MÍNIMAS NOS CANTOS */
        .seta {
            position: fixed;
            bottom: 10px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px; 
            cursor: pointer;
            padding: 15px;
        }
        #prev { left: 5px; }
        #next { right: 5px; }

        .link-final {
            position: absolute;
            display: block;
            z-index: 999;
            background: rgba(255, 255, 255, 0); /* Mude para 0.2 para testar a posição se necessário */
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <img src="p1.png">
                <a href="tel:+5516991128533" class="link-final" 
                   style="width: 102.4px; height: 23.4px; top: 50%; left: 50%; transform: translate(-110px, 31.3px);"></a>
                <a href="https://wa.me/5516991128533" target="_blank" class="link-final" 
                   style="width: 102.4px; height: 23.4px; top: 50%; left: 50%; transform: translate(10px, 31.3px);"></a>
            </div>

            <div class="swiper-slide"><img src="p2.png"></div>
            <div class="swiper-slide"><img src="p3.png"></div>
            <div class="swiper-slide"><img src="p4.png"></div>
            <div class="swiper-slide"><img src="p5.png"></div>

            <div class="swiper-slide">
                <img src="p6.png">
                <a href="tel:+5516991128533" class="link-final" 
                   style="width: 91.4px; height: 23.9px; top: 50%; left: 50%; transform: translate(-100px, 70.4px);"></a>
                <a href="https://wa.me/5516991128533" target="_blank" class="link-final" 
                   style="width: 91.4px; height: 23.9px; top: 50%; left: 50%; transform: translate(10px, 70.4px);"></a>
            </div>

            <div class="swiper-slide"><img src="p7.png"></div>

            <div class="swiper-slide">
                <img src="p8.png">
                <a href="tel:+5516991128533" class="link-final" 
                   style="width: 124.4px; height: 26.2px; top: 50%; left: 50%; transform: translate(-130px, 21.9px);"></a>
                <a href="https://wa.me/5516991128533" target="_blank" class="link-final" 
                   style="width: 124.4px; height: 26.2px; top: 50%; left: 50%; transform: translate(10px, 21.9px);"></a>
            </div>

        </div>
    </div>

    <div class="seta" id="prev">&#10094;</div>
    <div class="seta" id="next">&#10095;</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            grabCursor: true,
            mousewheel: true,
            keyboard: true,
            navigation: { nextEl: '#next', prevEl: '#prev' },
        });
    </script>
</body>
</html>
