<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z1N Arquiteturas</title>

<!-- Open Graph -->
<meta property="og:title" content="Z1N Arquiteturas">
<meta property="og:description" content="José Luís F. Navarro">
<meta property="og:image" content="https://z1n-arq.com.br/og-image.jpg">
<meta property="og:url" content="https://z1n-arq.com.br">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<!-- fallback para crawler -->
<meta name="description" content="Z1N Arquiteturas">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

html{
  width:100%;
  height:100%;
}

.swiper{
  width:100%;
  height:calc(var(--vh) * 100);
}

.swiper-slide{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  display:block;
}

.overlay{
  position:absolute;
}

.link{
  position:absolute;
  display:block;
}
</style>
</head>

<body>

<!-- 👇 ESSENCIAL PARA WHATSAPP -->
<div style="display:none;">
  Z1N Arquiteturas - José Luís F. Navarro
</div>

<div class="swiper">
  <div class="swiper-wrapper" id="wrapper"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
function setRealViewportHeight(){
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
setRealViewportHeight();
window.addEventListener('resize', setRealViewportHeight);
window.addEventListener('orientationchange', setRealViewportHeight);

const wrapper = document.getElementById('wrapper');

const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  loop: false,
  speed: 350
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

pdfjsLib.getDocument({
  url: 'portfolio.pdf',
  rangeChunkSize: 65536
}).promise.then(pdf=>{

const slides = [];

for(let i=1;i<=pdf.numPages;i++){

  const slide = document.createElement('div');
  slide.className = "swiper-slide";

  const canvas = document.createElement('canvas');
  slide.appendChild(canvas);

  const overlay = document.createElement('div');
  overlay.className = "overlay";
  slide.appendChild(overlay);

  wrapper.appendChild(slide);

  slides.push({
    canvas,
    overlay,
    rendered:false
  });
}

swiper.update();

function alinharOverlay(slide){
  const canvasRect = slide.canvas.getBoundingClientRect();
  const slideRect = slide.canvas.parentElement.getBoundingClientRect();

  slide.overlay.style.left = (canvasRect.left - slideRect.left) + "px";
  slide.overlay.style.top = (canvasRect.top - slideRect.top) + "px";
}

async function renderPage(i){

  if(!slides[i]) return;
  if(slides[i].rendered) return;

  slides[i].rendered = true;

  const page = await pdf.getPage(i+1);

  const viewport = page.getViewport({scale:1});

  const scale = Math.min(
    window.innerWidth / viewport.width,
    window.innerHeight / viewport.height
  );

  const scaledViewport = page.getViewport({scale});

  const canvas = slides[i].canvas;
  const ctx = canvas.getContext('2d');

  canvas.width = scaledViewport.width;
  canvas.height = scaledViewport.height;

  await page.render({
    canvasContext:ctx,
    viewport:scaledViewport
  }).promise;

  slides[i].overlay.style.width = canvas.width + "px";
  slides[i].overlay.style.height = canvas.height + "px";

  alinharOverlay(slides[i]);

  const annotations = await page.getAnnotations();

  annotations.forEach(annotation => {

    if(annotation.subtype === "Link" && annotation.url){

      const rect = pdfjsLib.Util.normalizeRect(annotation.rect);

      const x = rect[0] * scale;
      const y = (viewport.height - rect[3]) * scale;
      const w = (rect[2] - rect[0]) * scale;
      const h = (rect[3] - rect[1]) * scale;

      const link = document.createElement("a");

      link.href = annotation.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";

      link.className = "link";

      link.style.left = x + "px";
      link.style.top = y + "px";
      link.style.width = w + "px";
      link.style.height = h + "px";

      slides[i].overlay.appendChild(link);
    }

  });
}

renderPage(0);
renderPage(1);

swiper.on('slideChange', ()=>{
  const i = swiper.activeIndex;

  if(i >= 0) renderPage(i);
  if(i + 1 < slides.length) renderPage(i + 1);
  if(i - 1 >= 0) renderPage(i - 1);

  alinharOverlay(slides[i]);
});

window.addEventListener("resize", ()=>{
  slides.forEach(slide=>{
    if(slide.rendered){
      alinharOverlay(slide);
    }
  });
});

}).catch(err => {
  document.body.innerHTML = `
    <div style="color:white;text-align:center;padding:40px">
      Erro ao carregar portfólio.<br>
      <a href="portfolio.pdf" style="color:white">Baixar PDF</a>
    </div>
  `;
  console.error(err);
});
</script>

</body>
</html>
