<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

/* Container */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Slides */
.slide {
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  display: none;
  justify-content: center;
  align-items: center;
}

.slide.active {
  display: flex;
}

/* Canvas */
canvas {
  max-width: 100%;
  max-height: 100%;
  transform-origin: center center;
}

/* Botão WhatsApp */
.link {
  position: absolute;
  z-index: 10;
}

/* Setas */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  font-size: 30px;
  padding: 10px 15px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

</style>
</head>

<body>

<div class="slider" id="slider"></div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';
const slider = document.getElementById('slider');

let current = 0;
let slides = [];
let scale = 1;

/* -------- PDF LOAD -------- */
pdfjsLib.getDocument(url).promise.then(pdf => {

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      slides.push(slide);

      if (slides.length === 1) slide.classList.add("active");

      page.render({ canvasContext: ctx, viewport });

      /* WhatsApp */
      const wpp = document.createElement('a');
      wpp.href = "https://wa.me/5516991128533";
      wpp.className = "link";

      wpp.style.bottom = "8%";
      wpp.style.left = "50%";
      wpp.style.transform = "translateX(-50%)";
      wpp.style.width = "260px";
      wpp.style.height = "70px";

      slide.appendChild(wpp);

    });

  }

});

/* -------- NAV -------- */
function showPage(index) {
  if (index < 0 || index >= slides.length) return;

  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");

  resetZoom();
}

function next() {
  showPage(current + 1);
}

function prev() {
  showPage(current - 1);
}

/* -------- ZOOM DESKTOP -------- */
document.addEventListener("wheel", (e) => {
  if (e.ctrlKey) {
    e.preventDefault();

    scale += e.deltaY * -0.01;
    scale = Math.min(Math.max(1, scale), 4);

    applyZoom();
  }
}, { passive: false });

/* -------- ZOOM MOBILE (PINCH) -------- */
let initialDistance = null;

document.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();

    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (!initialDistance) {
      initialDistance = distance;
    } else {
      scale = distance / initialDistance;
      scale = Math.min(Math.max(1, scale), 4);
      applyZoom();
    }
  }
}, { passive: false });

document.addEventListener("touchend", () => {
  initialDistance = null;
});

/* -------- APPLY ZOOM -------- */
function applyZoom() {
  const canvas = slides[current].querySelector("canvas");
  if (canvas) {
    canvas.style.transform = `scale(${scale})`;
  }
}

function resetZoom() {
  scale = 1;
  applyZoom();
}
</script>

</body>
</html>
