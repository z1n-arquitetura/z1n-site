<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.slider{
  display:flex;
  height:100%;
  transition: transform .3s ease;
}

.slide{
  min-width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  max-width:100%;
  max-height:100%;
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.link{
  position:absolute;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

let index = 0;
let startX = 0;

// NAV
function update(){
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

function goTo(i){
  index = Math.max(0, Math.min(slider.children.length - 1, i));
  update();
}

// SWIPE SIMPLES (estável)
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  const diff = startX - e.changedTouches[0].clientX;

  if(Math.abs(diff) > 60){
    if(diff > 0) goTo(index + 1);
    else goTo(index - 1);
  }
});

// PDF
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

// 🔥 1. CRIA TODOS OS SLIDES ANTES
const slides = [];

for(let i=1;i<=pdf.numPages;i++){
  const slide = document.createElement('div');
  slide.className = "slide";

  const canvas = document.createElement('canvas');
  slide.appendChild(canvas);

  const overlay = document.createElement('div');
  overlay.className = "overlay";
  slide.appendChild(overlay);

  slider.appendChild(slide);

  slides.push({slide, canvas, overlay});
}

// 🔥 2. RENDERIZA DEPOIS (não quebra o slider)
slides.forEach((item, idx)=>{

  pdf.getPage(idx+1).then(page=>{

    const viewport = page.getViewport({scale:2});
    const canvas = item.canvas;
    const ctx = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    // FIT automático
    const ratio = Math.min(
      window.innerWidth / viewport.width,
      window.innerHeight / viewport.height
    );

    canvas.style.width = (viewport.width * ratio) + "px";
    canvas.style.height = (viewport.height * ratio) + "px";

    item.overlay.style.width = canvas.style.width;
    item.overlay.style.height = canvas.style.height;

    page.render({canvasContext:ctx,viewport});

    // LINKS
    function link(href, top, left, width, height){
      const el = document.createElement('a');

      el.href = href;
      el.className = "link";

      if(href.includes("wa.me")) el.target="_blank";

      el.style.top = top;
      el.style.left = left;
      el.style.width = width;
      el.style.height = height;

      item.overlay.appendChild(el);
    }

    const i = idx+1;

    if(i===1){
      link("tel:+5516991128533","76%","36%","34%","6%");
      link("https://wa.me/5516991128533","85%","32%","36%","8%");
    }

    if(i===6){
      link("https://wa.me/5516991128533","89%","32%","36%","8%");
    }

    if(i===8){
      link("tel:+5516991128533","70%","32%","36%","6%");
      link("https://wa.me/5516991128533","82%","44%","12%","10%");
    }

  });

});

});
</script>

</body>
</html>
