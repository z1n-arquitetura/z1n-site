<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas - MODO EDIÇÃO</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }
        .slider { width: 100vw; height: 100vh; position: relative; }
        .slide {
            width: 100%; height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 40px rgba(0,0,0,0.95);
        }

        .link {
            position: absolute;
            z-index: 9999;
            border: 5px solid #ff0000;
            background: rgba(255,0,0,0.25);
            cursor: move;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 6px black;
            box-shadow: 0 0 15px rgba(255,0,0,0.7);
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.95);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 10000;
            border: 2px solid #0f0;
            max-width: 420px;
        }
        #debug button {
            margin-top: 8px;
            padding: 8px 14px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="debug">
        <strong>🔧 MODO EDIÇÃO ATIVO</strong><br>
        Arraste os quadrados vermelhos com o mouse.<br>
        Página: <span id="pageNum">1</span> / <span id="totalPages">?</span><br><br>
        <div id="coords"></div>
        <button id="copyBtn">📋 Copiar código das posições</button>
        <button id="resetBtn" style="background:#ff6600;">🔄 Resetar posições</button>
    </div>

    <div class="slider" id="slider"></div>
    <button style="position:absolute;bottom:30px;left:20px;z-index:1000;width:65px;height:65px;font-size:42px;background:rgba(0,0,0,0.8);color:white;border:none;border-radius:50%;cursor:pointer;" onclick="prev()">←</button>
    <button style="position:absolute;bottom:30px;right:20px;z-index:1000;width:65px;height:65px;font-size:42px;background:rgba(0,0,0,0.8);color:white;border:none;border-radius:50%;cursor:pointer;" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io') || location.hostname.includes('z1n-arq')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let slides = [];
        let current = 0;

        // Posições iniciais VISÍVEIS (centralizadas)
        const linkConfigs = {
            1: [
                { id: "wa1",  href: "https://wa.me/5516991128533", label: "WA", x: 900, y: 650, w: 200, h: 140 },
                { id: "tel1", href: "tel:+5516991128533",       label: "TEL", x: 1150, y: 720, w: 520, h: 110 }
            ],
            6: [
                { id: "wa6",  href: "https://wa.me/5516991128533", label: "WA", x: 900, y: 820, w: 200, h: 140 },
                { id: "tel6", href: "tel:+5516991128533",       label: "TEL", x: 1150, y: 880, w: 500, h: 120 }
            ],
            last: [
                { id: "waLast",  href: "https://wa.me/5516991128533", label: "WA", x: 1250, y: 760, w: 180, h: 130 },
                { id: "telLast", href: "tel:+5516991128533",       label: "TEL", x: 1050, y: 620, w: 600, h: 160 }
            ]
        };

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            document.getElementById('totalPages').textContent = pdf.numPages;
            console.log("✅ PDF carregado com", pdf.numPages, "páginas");

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;
                    const viewportBase = page.getViewport({ scale: 1 });

                    const scale = Math.min(
                        (window.innerWidth * 0.96) / viewportBase.width,
                        (window.innerHeight * 0.92) / viewportBase.height
                    );

                    const viewport = page.getViewport({ scale });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);

                    slides.push({ slide, wrapper, viewportBase, pageIndex });

                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        createLinks(wrapper, pageIndex, viewportBase);
                        if (slides.length === 1) slide.classList.add("active");
                    });
                });
            }
        }).catch(err => console.error("❌ Erro PDF:", err));

        function createLinks(wrapper, pageIndex, viewportBase) {
            let configs = [];
            if (pageIndex === 1) configs = linkConfigs[1];
            else if (pageIndex === 6) configs = linkConfigs[6];
            else if (pageIndex === slides.length) configs = linkConfigs.last;

            console.log(`📄 Página ${pageIndex} → criando ${configs.length} links`);

            configs.forEach(cfg => {
                const link = document.createElement('a');
                link.href = cfg.href;
                link.className = 'link';
                link.dataset.id = cfg.id;
                link.innerHTML = cfg.label;   // ← texto dentro do quadrado

                link.style.left = (cfg.x / viewportBase.width * 100) + '%';
                link.style.top = (cfg.y / viewportBase.height * 100) + '%';
                link.style.width = (cfg.w / viewportBase.width * 100) + '%';
                link.style.height = (cfg.h / viewportBase.height * 100) + '%';

                makeDraggable(link, viewportBase);
                wrapper.appendChild(link);
            });
        }

        function makeDraggable(el, viewportBase) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.onmousedown = (e) => {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                let newLeft = el.offsetLeft - pos1;
                let newTop = el.offsetTop - pos2;

                newLeft = Math.max(0, Math.min(el.parentElement.offsetWidth - el.offsetWidth, newLeft));
                newTop = Math.max(0, Math.min(el.parentElement.offsetHeight - el.offsetHeight, newTop));

                el.style.left = (newLeft / el.parentElement.offsetWidth * 100) + '%';
                el.style.top = (newTop / el.parentElement.offsetHeight * 100) + '%';
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        document.getElementById('copyBtn').onclick = () => {
            let output = "/* Posições ajustadas */\n";
            Object.keys(linkConfigs).forEach(key => {
                output += `// Página ${key}\n`;
                linkConfigs[key].forEach(cfg => {
                    const el = document.querySelector(`[data-id="${cfg.id}"]`);
                    if (el) {
                        const left = parseFloat(el.style.left);
                        const top = parseFloat(el.style.top);
                        const w = parseFloat(el.style.width);
                        const h = parseFloat(el.style.height);
                        const x = Math.round(left / 100 * 1700);
                        const y = Math.round(top / 100 * 2200);
                        const ww = Math.round(w / 100 * 1700);
                        const hh = Math.round(h / 100 * 2200);
                        output += `{ href: "${cfg.href}", x: ${x}, y: ${y}, w: ${ww}, h: ${hh} },\n`;
                    }
                });
            });
            navigator.clipboard.writeText(output);
            alert("✅ Código copiado! Cole aqui para mim.");
        };

        document.getElementById('resetBtn').onclick = () => location.reload();

        function showPage(index) {
            slides.forEach(s => s.slide.classList.remove("active"));
            if (slides[index]) slides[index].slide.classList.add("active");
            document.getElementById('pageNum').textContent = slides[index] ? slides[index].pageIndex : 1;
            current = index;
        }

        function next() { current = (current + 1) % slides.length; showPage(current); }
        function prev() { current = (current - 1 + slides.length) % slides.length; showPage(current); }

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
