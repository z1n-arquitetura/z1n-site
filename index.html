body, html {

}

.swiper {
    width: 100%;
    height: 100vh;
}

.swiper-slide {

}

.canvas {

.canvas img {

}

.link-final {

}

.seta {

    bottom: 10px;
    z-index: 1000;
    color: rgba(255,255,255,0.15);
    font-size: 14px;
    cursor: pointer;
    padding: 15px;
}

#prev { left: 5px; }
#next { right: 5px; }
</style>
