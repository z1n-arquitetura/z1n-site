<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

.slider {
  display: flex;
  width: 100vw;
  height: 100dvh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.slide {
  flex: none;
  width: 100vw;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  scroll-snap-align: start;
  position: relative;
  background: #000;
}

canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* MODO VISUAL */
.link {
  position: absolute;
  z-index: 10;
  background: rgba(255,0,0,0.3);
  border: 2px dashed #fff;
  resize: both;
  overflow: auto;
  cursor: move;
  user-select: none;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// FUNÇÃO DRAG (APLICADA EM TODOS)
function ativarDrag(el) {

  let isDragging = false;
  let offsetX, offsetY;

  el.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    const parent = el.parentElement.getBoundingClientRect();

    let x = ((e.clientX - parent.left - offsetX) / parent.width) * 100;
    let y = ((e.clientY - parent.top - offsetY) / parent.height) * 100;

    el.style.left = x + "%";
    el.style.top = y + "%";
    el.style.transform = "none";
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;

    console.log("TOP:", el.style.top);
    console.log("LEFT:", el.style.left);
    console.log("WIDTH:", el.offsetWidth + "px");
    console.log("HEIGHT:", el.offsetHeight + "px");
  });
}

const url = 'portfolio.pdf';

        const wpp2 = document.createElement('a');
        wpp2.href = "https://wa.me/5516991128533";
        wpp2.className = "link";
        wpp2.style.top = "78%";
        wpp2.style.left = "50%";

});
</script>

<!-- SLIDE COM TRAVA -->
<script>
let isDown = false;
let startX;
let scrollLeft;

slider.addEventListener('mousedown', (e) => {
  isDown = true;
  startX = e.pageX;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener('mouseup', () => {
  isDown = false;
  const slideWidth = window.innerWidth;
  const index = Math.round(slider.scrollLeft / slideWidth);

  slider.scrollTo({
    left: index * slideWidth,
    behavior: 'smooth'
  });
});

slider.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  const walk = (e.pageX - startX) * 0.8;
  slider.scrollLeft = scrollLeft - walk;
});
</script>

</body>
