        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; }

        }
        #prev { left: 5px; }
        #next { right: 5px; }

        /* LINKS TOTALMENTE INVISÍVEIS */
        .link-final {
            position: absolute;
            display: block;
            z-index: 999;
            background: rgba(255, 255, 255, 0);
        }
    </style>
</head>
