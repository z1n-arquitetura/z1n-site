<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  background:#000;
}

/* SWIPER */
.swiper{
  width:100vw;
  height:100vh;
}

.swiper-slide{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  max-width:100%;
  max-height:100%;
}

/* overlay */
.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.link{
  position:absolute;
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper" id="wrapper"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const wrapper = document.getElementById('wrapper');

// INIT SWIPER
const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  loop: false,
  resistanceRatio: 0.85,
  speed: 400,
});

// PDF
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

const slides = [];

// 🔥 cria slides primeiro
for(let i=1;i<=pdf.numPages;i++){

  const slide = document.createElement('div');
  slide.className = "swiper-slide";

  const canvas = document.createElement('canvas');
  slide.appendChild(canvas);

  const overlay = document.createElement('div');
  overlay.className = "overlay";
  slide.appendChild(overlay);

  wrapper.appendChild(slide);

  slides.push({canvas, overlay});
}

// atualiza swiper depois de criar
swiper.update();

// render controlado (só visíveis)
function renderPage(i){

  if(slides[i].rendered) return;
  slides[i].rendered = true;

  pdf.getPage(i+1).then(page=>{

    const viewport = page.getViewport({scale:2});
    const canvas = slides[i].canvas;
    const ctx = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const ratio = Math.min(
      window.innerWidth / viewport.width,
      window.innerHeight / viewport.height
    );

    canvas.style.width = (viewport.width * ratio) + "px";
    canvas.style.height = (viewport.height * ratio) + "px";

    slides[i].overlay.style.width = canvas.style.width;
    slides[i].overlay.style.height = canvas.style.height;

    page.render({canvasContext:ctx,viewport});

    // LINKS
    function link(href, top, left, width, height){
      const el = document.createElement('a');

      el.href = href;
      el.className = "link";

      if(href.includes("wa.me")) el.target="_blank";

      el.style.top = top;
      el.style.left = left;
      el.style.width = width;
      el.style.height = height;

      slides[i].overlay.appendChild(el);
    }

    const pageNum = i+1;

    if(pageNum===1){
      link("tel:+5516991128533","76%","36%","34%","6%");
      link("https://wa.me/5516991128533","85%","32%","36%","8%");
    }

    if(pageNum===6){
      link("https://wa.me/5516991128533","89%","32%","36%","8%");
    }

    if(pageNum===8){
      link("tel:+5516991128533","70%","32%","36%","6%");
      link("https://wa.me/5516991128533","82%","44%","12%","10%");
    }

  });
}

// 🔥 render inicial
renderPage(0);
renderPage(1);

// 🔥 lazy loading real
swiper.on('slideChange', ()=>{
  renderPage(swiper.activeIndex);
  renderPage(swiper.activeIndex + 1);
});

});
</script>

</body>
</html>
