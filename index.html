<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z1N Arquiteturas</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

.swiper{
  width:100%;
  height:100dvh;
}

.swiper-slide{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  display:block;
  max-width:100%;
  max-height:100%;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
}

.link{
  position:absolute;
  display:block;
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper" id="wrapper"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const wrapper = document.getElementById('wrapper');

const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  loop: false,
  speed: 350
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

const slides = [];

for(let i=1;i<=pdf.numPages;i++){

  const slide = document.createElement('div');
  slide.className = "swiper-slide";

  const canvas = document.createElement('canvas');
  slide.appendChild(canvas);

  const overlay = document.createElement('div');
  overlay.className = "overlay";
  slide.appendChild(overlay);

  wrapper.appendChild(slide);

  slides.push({
    canvas,
    overlay,
    rendered:false
  });
}

swiper.update();

function renderPage(i){

  if(!slides[i]) return;
  if(slides[i].rendered) return;

  slides[i].rendered = true;

  pdf.getPage(i+1).then(async page=>{

    const viewport = page.getViewport({scale:2});
    const canvas = slides[i].canvas;
    const ctx = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const ratio = Math.min(
      window.innerWidth / viewport.width,
      window.innerHeight / viewport.height
    );

    const width = viewport.width * ratio;
    const height = viewport.height * ratio;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    slides[i].overlay.style.width = width + "px";
    slides[i].overlay.style.height = height + "px";

    page.render({
      canvasContext:ctx,
      viewport
    });

    // 🔥 detectar links do PDF automaticamente
    const annotations = await page.getAnnotations();

    annotations.forEach(annotation => {

      if(annotation.subtype === "Link" && annotation.url){

        const rect = pdfjsLib.Util.normalizeRect(annotation.rect);

        const x = rect[0] * ratio;
        const y = (viewport.height - rect[3]) * ratio;
        const w = (rect[2] - rect[0]) * ratio;
        const h = (rect[3] - rect[1]) * ratio;

        const link = document.createElement("a");
        link.href = annotation.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        link.className = "link";
        link.style.left = x + "px";
        link.style.top = y + "px";
        link.style.width = w + "px";
        link.style.height = h + "px";

        slides[i].overlay.appendChild(link);
      }

    });

  });
}

// render inicial
renderPage(0);
renderPage(1);
renderPage(2);

// lazy load
swiper.on('slideChange', ()=>{
  const i = swiper.activeIndex;

  renderPage(i);
  renderPage(i+1);
  renderPage(i-1);
});

});
</script>

</body>
</html>
