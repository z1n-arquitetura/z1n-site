<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z1N Arquiteturas</title>

<!-- CAPA WHATSAPP -->
<meta property="og:title" content="Z1N Arquiteturas">
<meta property="og:description" content="Projetos exclusivos">
<meta property="og:image" content="https://z1n-arquitetura.github.io/z1n-site/og-image.jpg">
<meta property="og:url" content="https://z1n-arquitetura.github.io/z1n-site/">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

/* SLIDER */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide {
  width: 100%;
  height: 100%;
  position: absolute;
  display: none;
  justify-content: center;
  align-items: flex-start; /* 🔥 remove faixa preta */
}

.slide.active {
  display: flex;
}

canvas {
  max-width: 100%;
  max-height: 100%;
}

/* LINKS */
.link {
  position: absolute;
  z-index: 10;
}

/* SETAS */
.nav {
  position: absolute;
  bottom: 20px;
  z-index: 20;
  color: white;
  font-size: 32px;
  background: none;
  border: none;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<body>

<div class="slider" id="slider"></div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';
const slider = document.getElementById('slider');

let current = 0;
let slides = [];

pdfjsLib.getDocument(url).promise.then(pdf => {

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      slides.push(slide);
      if (slides.length === 1) slide.classList.add("active");

      page.render({ canvasContext: ctx, viewport });

      const pageIndex = i;

      /* ===== PAGINA 1 ===== */
      if (pageIndex === 1) {
        createLink(slide, "https://wa.me/5516991128533", 1142, 735, 120, 120);
        createLink(slide, "tel:+5516991128533", 1274, 757, 488, 81);
      }

      /* ===== PAGINA 6 ===== */
      if (pageIndex === 6) {
        createLink(slide, "https://wa.me/5516991128533", 1158, 918, 120, 120);
        createLink(slide, "tel:+5516991128533", 1284, 929, 458, 94);
      }

      /* ===== PAGINA FINAL ===== */
      if (pageIndex === pdf.numPages) {
        createLink(slide, "https://wa.me/5516991128533", 1383, 825, 127, 97);
        createLink(slide, "tel:+5516991128533", 1157, 666, 592, 151);
      }

    });

  }

});

/* ===== LINKS RESPONSIVOS ===== */
function createLink(slide, href, x, y, w, h) {

  const link = document.createElement('a');
  link.href = href;
  link.className = 'link';

  const canvas = slide.querySelector("canvas");

  const percentX = (x / canvas.width) * 100;
  const percentY = (y / canvas.height) * 100;
  const percentW = (w / canvas.width) * 100;
  const percentH = (h / canvas.height) * 100;

  link.style.left = percentX + "%";
  link.style.top = percentY + "%";
  link.style.width = percentW + "%";
  link.style.height = percentH + "%";

  slide.appendChild(link);
}

/* ===== NAVEGAÇÃO ===== */
function showPage(index) {
  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");
}

function next() {
  current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
}

function prev() {
  current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
}
</script>

</body>
</html>
