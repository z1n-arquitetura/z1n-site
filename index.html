<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N | Portfólio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* SETAS MÍNIMAS NOS CANTOS INFERIORES */
        .seta {
            position: fixed;
            bottom: 15px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.4); /* Cor suave para não distrair */
            font-size: 18px; /* Tamanho pequeno, aprox. 5mm */
            cursor: pointer;
            user-select: none;
            padding: 10px;
        }
        #prev { left: 10px; }
        #next { right: 10px; }

        /* LINKS INVISÍVEIS E EDITÁVEIS */
        .link-invisivel {
            position: absolute;
            display: block;
            background: rgba(255, 0, 0, 0); /* Mude para 0.2 se quiser ver a caixa enquanto edita */
            z-index: 999;
            /* TAMANHO DA ÁREA CLICÁVEL - AJUSTE AQUI */
            width: 150px; 
            height: 60px;
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="p1.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" style="top: 80%; left: 50%; transform: translateX(-50%);"></a>
            </div>

            <div class="swiper-slide"><img src="p2.png"></div>
            <div class="swiper-slide"><img src="p3.png"></div>
            <div class="swiper-slide"><img src="p4.png"></div>
            <div class="swiper-slide"><img src="p5.png"></div>

            <div class="swiper-slide">
                <img src="p6.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" style="top: 75%; left: 50%; transform: translateX(-50%);"></a>
            </div>

            <div class="swiper-slide"><img src="p7.png"></div>

            <div class="swiper-slide">
                <img src="p8.png">
                <a href="https://wa.me/55NUMERO" target="_blank" class="link-invisivel" style="top: 70%; left: 30%;"></a>
                <a href="tel:+55NUMERO" class="link-invisivel" style="top: 70%; left: 60%;"></a>
            </div>
        </div>
    </div>

    <div class="seta" id="prev">&#10094;</div>
    <div class="seta" id="next">&#10095;</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            grabCursor: true,
            mousewheel: true,
            keyboard: true,
            navigation: { nextEl: '#next', prevEl: '#prev' },
        });
    </script>
</body>
</html>
