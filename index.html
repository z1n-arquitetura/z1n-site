<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  touch-action:pan-y;
}

.slider{
  display:flex;
  width:100%;
  height:100%;
  transition: transform .35s cubic-bezier(.25,.8,.25,1);
}

.slide{
  min-width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  display:block;
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

.link{
  position:absolute;
  z-index:10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

let index = 0;
let startX = 0;
let isDragging = false;
let currentTranslate = 0;

// SNAP NAV
function updateSlider(animate=true){
  if(animate){
    slider.style.transition = "transform .35s cubic-bezier(.25,.8,.25,1)";
  }else{
    slider.style.transition = "none";
  }
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  updateSlider(true);
}

// TOUCH (com drag real + snap)
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  isDragging = true;
  slider.style.transition = "none";
});

document.addEventListener("touchmove", e=>{
  if(!isDragging) return;

  const currentX = e.touches[0].clientX;
  const diff = currentX - startX;

  const base = -index * window.innerWidth;
  slider.style.transform = `translateX(${base + diff}px)`;
});

document.addEventListener("touchend", e=>{
  if(!isDragging) return;
  isDragging = false;

  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if(Math.abs(diff) > 60){
    if(diff > 0) index++;
    else index--;
  }

  updateSlider(true);
});

// PDF
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

const rendered = new Set();

function renderPage(i){

if(rendered.has(i)) return;
rendered.add(i);

pdf.getPage(i).then(page=>{

const scale = window.devicePixelRatio || 1.5;
const viewport = page.getViewport({scale});

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

canvas.width = viewport.width;
canvas.height = viewport.height;

// 🔥 FIT NA TELA
const screenW = window.innerWidth;
const screenH = window.innerHeight;

const fit = Math.min(
  screenW / viewport.width,
  screenH / viewport.height
);

canvas.style.width = (viewport.width * fit) + "px";
canvas.style.height = (viewport.height * fit) + "px";

const slide = document.createElement('div');
slide.className = "slide";

slide.appendChild(canvas);

// overlay
const overlay = document.createElement('div');
overlay.className = "overlay";
overlay.style.width = canvas.style.width;
overlay.style.height = canvas.style.height;

slide.appendChild(overlay);
slider.appendChild(slide);

// render
page.render({canvasContext:ctx,viewport});

// links
function link(href, top, left, width, height){
  const el = document.createElement('a');

  el.href = href;
  el.className = "link";

  if(href.includes("wa.me")) el.target="_blank";

  el.style.top = top;
  el.style.left = left;
  el.style.width = width;
  el.style.height = height;

  overlay.appendChild(el);
}

// hotspots
if(i===1){
  link("tel:+5516991128533","76%","36%","34%","6%");
  link("https://wa.me/5516991128533","85%","32%","36%","8%");
}

if(i===6){
  link("https://wa.me/5516991128533","89%","32%","36%","8%");
}

if(i===8){
  link("tel:+5516991128533","70%","32%","36%","6%");
  link("https://wa.me/5516991128533","82%","44%","12%","10%");
}

});
}

// INIT
renderPage(1);
renderPage(2);

// PRELOAD DINÂMICO
document.addEventListener("touchend", ()=>{
  renderPage(index+1);
  renderPage(index+2);
});

});
</script>

</body>
</html>
