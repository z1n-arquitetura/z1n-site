<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        .swiper {
            width: 100%;
            height: 100vh;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .seta {
            position: fixed;
            bottom: 10px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            cursor: pointer;
            padding: 15px;
            user-select: none;
        }

        #prev { left: 5px; }
        #next { right: 5px; }

        .link-final {
            position: absolute;
            display: block;
            z-index: 999;
            background: rgba(255, 255, 255, 0);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>

<script>
