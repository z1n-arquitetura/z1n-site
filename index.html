<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>

    <meta property="og:title" content="Z1N Arquiteturas">
    <meta property="og:description" content="Projetos exclusivos">
    <meta property="og:image" content="https://z1n-arquitetura.github.io/z1n-site/og-image.jpg">
    <meta property="og:url" content="https://z1n-arquitetura.github.io/z1n-site/">
    <meta property="og:type" content="website">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .link {
            position: absolute;
            z-index: 9999;
            border: 2px solid rgba(255, 0, 0, 0.6);
            background: rgba(255, 0, 0, 0.15);
            pointer-events: all;
            cursor: pointer;
            transition: all 0.2s;
        }
        .link:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: red;
        }

        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.75);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>

    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let current = 0;
        let slides = [];
        let resizeObserver;

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log(`PDF carregado: ${pdf.numPages} páginas`);

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;
                    const viewportBase = page.getViewport({ scale: 1.0 });

                    // Calcula scale ideal para caber na tela
                    const scaleX = (window.innerWidth * 0.98) / viewportBase.width;
                    const scaleY = (window.innerHeight * 0.95) / viewportBase.height;
                    const scale = Math.min(scaleX, scaleY);

                    const viewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);
                    slides.push({ slide, wrapper, viewportBase, pageIndex });

                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        createLinksForPage(wrapper, pageIndex, viewportBase);

                        if (slides.length === 1) {
                            slide.classList.add("active");
                        }
                    });
                });
            }
        }).catch(err => console.error("Erro PDF:", err));

        function createLinksForPage(wrapper, pageIndex, viewportBase) {
            const links = [];

            if (pageIndex === 1) {
                links.push({ href: "https://wa.me/5516991128533", x: 1142, y: 735, w: 120, h: 120 });
                links.push({ href: "tel:+5516991128533", x: 1274, y: 757, w: 488, h: 81 });
            }
            if (pageIndex === 6) {
                links.push({ href: "https://wa.me/5516991128533", x: 1158, y: 918, w: 120, h: 120 });
                links.push({ href: "tel:+5516991128533", x: 1284, y: 929, w: 458, h: 94 });
            }
            if (pageIndex === slides.length) {  // última página
                links.push({ href: "https://wa.me/5516991128533", x: 1383, y: 825, w: 127, h: 97 });
                links.push({ href: "tel:+5516991128533", x: 1157, y: 666, w: 592, h: 151 });
            }

            links.forEach(linkData => {
                const link = document.createElement('a');
                link.href = linkData.href;
                link.className = 'link';
                link.target = '_blank';
                link.rel = 'noopener';

                const percentX = (linkData.x / viewportBase.width) * 100;
                const percentY = (linkData.y / viewportBase.height) * 100;
                const percentW = (linkData.w / viewportBase.width) * 100;
                const percentH = (linkData.h / viewportBase.height) * 100;

                link.style.left = `${percentX}%`;
                link.style.top = `${percentY}%`;
                link.style.width = `${percentW}%`;
                link.style.height = `${percentH}%`;

                wrapper.appendChild(link);
                console.log(`Link página ${pageIndex}: ${percentX.toFixed(1)}% ${percentY.toFixed(1)}%`);
            });
        }

        function showPage(index) {
            slides.forEach(s => s.slide.classList.remove("active"));
            if (slides[index]) slides[index].slide.classList.add("active");
            current = index;
        }

        function next() {
            current = (current + 1) % slides.length;
            showPage(current);
        }

        function prev() {
            current = (current - 1 + slides.length) % slides.length;
            showPage(current);
        }

        // Recalcula posições quando a tela muda de tamanho (ex: girar celular)
        window.addEventListener('resize', () => {
            location.reload(); // Mais simples e confiável por enquanto
        });
    </script>
</body>
</html>
