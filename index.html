<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow: hidden;
  background: #000;
}

/* SLIDER */
.slider {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide {
  width: 100vw;
  height: 100vh;
  position: absolute;
  display: none;
  justify-content: center;
  align-items: flex-start;
}

.slide.active {
  display: flex;
}

canvas {
  max-width: 100%;
  max-height: 100%;
}

/* LINKS VISÍVEIS (EDITÁVEIS) */
.link {
  position: absolute;
  z-index: 50;
  border: 2px dashed yellow;
  background: rgba(255,255,0,0.2);
  cursor: move;
}

.link.wpp {
  border-color: red;
  background: rgba(255,0,0,0.2);
}

/* SETAS */
.nav {
  position: absolute;
  bottom: 20px;
  z-index: 20;
  background: transparent;
  color: white;
  border: none;
  font-size: 32px;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<body>

<div class="slider" id="slider"></div>

<button class="nav prev" onclick="prev()">←</button>
<button class="nav next" onclick="next()">→</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';
const slider = document.getElementById('slider');

let current = 0;
let slides = [];

/* -------- PDF LOAD -------- */
pdfjsLib.getDocument(url).promise.then(pdf => {

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      slides.push(slide);
      if (slides.length === 1) slide.classList.add("active");

      page.render({ canvasContext: ctx, viewport });

      const pageIndex = i;

/* =========================
   PÁGINA 1
========================= */
if (pageIndex === 1) {

  createLink(slide, "wpp", "https://wa.me/5516991128533", 20, 75, 80, 80);
  createLink(slide, "tel", "tel:+5516991128533", 35, 75, 300, 80);

}

/* =========================
   PÁGINA 6
========================= */
if (pageIndex === 6) {

  createLink(slide, "wpp", "https://wa.me/5516991128533", 40, 75, 80, 80);
  createLink(slide, "tel", "tel:+5516991128533", 10, 65, 400, 90);

}

/* =========================
   PÁGINA 8 (ÚLTIMA)
========================= */
if (pageIndex === pdf.numPages) {

  createLink(slide, "wpp", "https://wa.me/5516991128533", 10, 70, 90, 90);
  createLink(slide, "tel", "tel:+5516991128533", 30, 70, 350, 90);

}

    });

  }

});

/* -------- CRIAR LINK -------- */
function createLink(slide, type, href, x, y, w, h) {

  const link = document.createElement('a');
  link.href = href;
  link.className = 'link ' + type;

  link.style.left = x + "px";
  link.style.top = y + "%";
  link.style.width = w + "px";
  link.style.height = h + "px";

  slide.appendChild(link);

  makeDraggable(link);
}

/* -------- DRAG -------- */
function makeDraggable(el) {
  let isDown = false, offsetX, offsetY;

  el.addEventListener('mousedown', e => {
    isDown = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener('mousemove', e => {
    if (!isDown) return;

    el.style.left = (e.pageX - offsetX) + 'px';
    el.style.top = (e.pageY - offsetY) + 'px';
  });

  document.addEventListener('mouseup', () => {
    isDown = false;
  });
}

/* -------- NAV -------- */
function showPage(index) {
  slides[current].classList.remove("active");
  current = index;
  slides[current].classList.add("active");
}

function next() {
  current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
}

function prev() {
  current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
}
</script>

</body>
</html>
