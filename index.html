<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas - Modo Ajuste</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .link {
            position: absolute;
            z-index: 9999;
            border: 4px solid #ff0000;
            background: rgba(255,0,0,0.25);
            cursor: move;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 12px;
            border-radius: 6px;
            z-index: 10000;
            font-size: 14px;
            border: 1px solid #0f0;
        }
        button {
            margin-top: 8px;
            padding: 8px 12px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="info">
        <strong>Modo Ajuste Ativo</strong><br>
        Arraste os quadrados vermelhos para ajustar a posição.<br>
        Página atual: <span id="pagina">1</span><br><br>
        <button onclick="copiarPosicoes()">Copiar posições ajustadas</button>
    </div>

    <div class="slider" id="slider"></div>
    <button style="position:absolute; bottom:30px; left:20px; z-index:1000; width:65px; height:65px; font-size:42px; background:rgba(0,0,0,0.8); color:white; border:none; border-radius:50%;" onclick="prev()">←</button>
    <button style="position:absolute; bottom:30px; right:20px; z-index:1000; width:65px; height:65px; font-size:42px; background:rgba(0,0,0,0.8); color:white; border:none; border-radius:50%;" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'https://z1n-arq.com.br/portfolio.pdf';

        const slider = document.getElementById('slider');
        let slides = [];
        let current = 0;

        // Configuração inicial
        let configs = {
            1: [
                {id: "wa1", href: "https://wa.me/5516991128533", label: "WA", x: 1050, y: 680, w: 200, h: 140},
                {id: "tel1", href: "tel:+5516991128533", label: "TEL", x: 1220, y: 740, w: 500, h: 100}
            ],
            6: [
                {id: "wa6", href: "https://wa.me/5516991128533", label: "WA", x: 1050, y: 870, w: 200, h: 140},
                {id: "tel6", href: "tel:+5516991128533", label: "TEL", x: 1220, y: 915, w: 490, h: 110}
            ],
            last: [
                {id: "waLast", href: "https://wa.me/5516991128533", label: "WA", x: 1280, y: 780, w: 180, h: 130},
                {id: "telLast", href: "tel:+5516991128533", label: "TEL", x: 1060, y: 650, w: 610, h: 170}
            ]
        };

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log("PDF carregado:", pdf.numPages, "páginas");

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;
                    const viewportBase = page.getViewport({ scale: 1 });

                    const scale = Math.min(
                        (window.innerWidth * 0.96) / viewportBase.width,
                        (window.innerHeight * 0.92) / viewportBase.height
                    );

                    const viewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);
                    slides.push({slide, wrapper, viewportBase, pageIndex});

                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        loadLinks(wrapper, pageIndex, viewportBase);
                        if (slides.length === 1) slide.classList.add("active");
                    });
                });
            }
        }).catch(err => alert("Erro ao carregar PDF"));

        function loadLinks(wrapper, pageIndex, viewportBase) {
            let currentConfigs = [];
            if (pageIndex === 1) currentConfigs = configs[1];
            else if (pageIndex === 6) currentConfigs = configs[6];
            else if (pageIndex === slides.length) currentConfigs = configs.last;

            currentConfigs.forEach(cfg => {
                const link = document.createElement('a');
                link.href = cfg.href;
                link.className = 'link';
                link.dataset.id = cfg.id;
                link.textContent = cfg.label;

                // Posição inicial
                link.style.left = (cfg.x / viewportBase.width * 100) + '%';
                link.style.top = (cfg.y / viewportBase.height * 100) + '%';
                link.style.width = (cfg.w / viewportBase.width * 100) + '%';
                link.style.height = (cfg.h / viewportBase.height * 100) + '%';

                makeDraggable(link, viewportBase);
                wrapper.appendChild(link);
            });
        }

        function makeDraggable(el, viewportBase) {
            let offsetX, offsetY;

            el.addEventListener('mousedown', (e) => {
                const rect = el.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                const wrapperRect = el.parentElement.getBoundingClientRect();

                let newLeft = ((e.clientX - wrapperRect.left - offsetX) / wrapperRect.width) * 100;
                let newTop = ((e.clientY - wrapperRect.top - offsetY) / wrapperRect.height) * 100;

                newLeft = Math.max(0, Math.min(95, newLeft));
                newTop = Math.max(0, Math.min(95, newTop));

                el.style.left = newLeft + '%';
                el.style.top = newTop + '%';
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
        }

        function copiarPosicoes() {
            let texto = "Posições ajustadas:\n\n";
            Object.keys(configs).forEach(key => {
                texto += `// Página ${key}\n`;
                configs[key].forEach(cfg => {
                    const el = document.querySelector(`[data-id="${cfg.id}"]`);
                    if (el) {
                        const left = parseFloat(el.style.left);
                        const top = parseFloat(el.style.top);
                        const w = parseFloat(el.style.width);
                        const h = parseFloat(el.style.height);

                        const x = Math.round(left / 100 * 1700);
                        const y = Math.round(top / 100 * 2200);
                        const ww = Math.round(w / 100 * 1700);
                        const hh = Math.round(h / 100 * 2200);

                        texto += `{ href: "${cfg.href}", x: ${x}, y: ${y}, w: ${ww}, h: ${hh} },\n`;
                    }
                });
            });
            navigator.clipboard.writeText(texto);
            alert("✅ Posições copiadas! Cole aqui para mim.");
        }

        function showPage(index) {
            slides.forEach(s => s.slide.classList.remove("active"));
            if (slides[index]) {
                slides[index].slide.classList.add("active");
                document.getElementById('pagina').textContent = slides[index].pageIndex;
            }
            current = index;
        }

        function next() { current = (current + 1) % slides.length; showPage(current); }
        function prev() { current = (current - 1 + slides.length) % slides.length; showPage(current); }

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
