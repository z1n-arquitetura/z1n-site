<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquitetura | Portfólio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Helvetica', sans-serif; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .contatos {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 999;
        }
        .btn {
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-wa { background: #25d366; }
        .btn-tel { background: #333; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="p1.png"></div>
            <div class="swiper-slide"><img src="p2.png"></div>
            <div class="swiper-slide"><img src="p3.png"></div>
            <div class="swiper-slide"><img src="p4.png"></div>
            <div class="swiper-slide"><img src="p5.png"></div>
            <div class="swiper-slide"><img src="p6.png"></div>
            <div class="swiper-slide"><img src="p7.png"></div>
            <div class="swiper-slide"><img src="p8.png"></div>
        </div>
    </div>

    <div class="contatos">
        <a href="https://wa.me/5500000000000" target="_blank" class="btn btn-wa">WHATSAPP</a>
        <a href="tel:+5500000000000" class="btn btn-tel">LIGAR</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: false,
            keyboard: true,
            mousewheel: true,
        });
    </script>
</body>
</html>
