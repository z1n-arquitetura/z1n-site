<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>

    <meta property="og:title" content="Z1N Arquiteturas">
    <meta property="og:description" content="Projetos exclusivos">
    <meta property="og:image" content="https://z1n-arquitetura.github.io/z1n-site/og-image.jpg">
    <meta property="og:url" content="https://z1n-arquitetura.github.io/z1n-site/">
    <meta property="og:type" content="website">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .link {
            position: absolute;
            z-index: 9999;
            background: rgba(255, 0, 0, 0.25);
            border: 2px dashed red;
            pointer-events: all;
            cursor: pointer;
        }

        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
            user-select: none;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>

    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfUrl = 'portfolio.pdf';
        if (location.hostname.includes('github.io')) {
            pdfUrl = 'https://z1n-arquitetura.github.io/z1n-site/portfolio.pdf';
        }

        const slider = document.getElementById('slider');
        let current = 0;
        let slides = [];

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log(`PDF carregado com ${pdf.numPages} páginas`);

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;

                    // Calcula scale para caber na tela mantendo proporção
                    const viewportBase = page.getViewport({ scale: 1 });
                    const scaleX = window.innerWidth / viewportBase.width;
                    const scaleY = window.innerHeight / viewportBase.height;
                    const scale = Math.min(scaleX, scaleY) * 0.95; // 95% para margem

                    const viewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);
                    slides.push(slide);

                    // Renderiza a página
                    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                        console.log(`Página ${pageIndex} renderizada (scale ≈ ${scale.toFixed(2)})`);

                        // Cria os links com posições em %
                        if (pageIndex === 1) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1142, 735, 120, 120, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1274, 757, 488, 81, viewportBase);
                        }
                        if (pageIndex === 6) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1158, 918, 120, 120, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1284, 929, 458, 94, viewportBase);
                        }
                        if (pageIndex === pdf.numPages) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1383, 825, 127, 97, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1157, 666, 592, 151, viewportBase);
                        }
                    });

                    if (slides.length === 1) slide.classList.add("active");
                });
            }
        }).catch(err => {
            console.error("Erro ao carregar PDF:", err);
        });

        function createLink(wrapper, href, x, y, w, h, viewportBase) {
            const link = document.createElement('a');
            link.href = href;
            link.className = 'link';
            link.target = '_blank';
            link.rel = 'noopener';

            // Calcula posição em porcentagem relativa ao PDF original (viewportBase)
            const percentX = (x / viewportBase.width) * 100;
            const percentY = (y / viewportBase.height) * 100;
            const percentW = (w / viewportBase.width) * 100;
            const percentH = (h / viewportBase.height) * 100;

            link.style.left = percentX + '%';
            link.style.top = percentY + '%';
            link.style.width = percentW + '%';
            link.style.height = percentH + '%';

            wrapper.appendChild(link);

            console.log(`Link criado na página - X:${percentX.toFixed(1)}% Y:${percentY.toFixed(1)}% W:${percentW.toFixed(1)}% H:${percentH.toFixed(1)}%`);
        }

        function showPage(index) {
            if (slides[current]) slides[current].classList.remove("active");
            current = index;
            if (slides[current]) slides[current].classList.add("active");
        }

        function next() {
            current >= slides.length - 1 ? showPage(0) : showPage(current + 1);
        }

        function prev() {
            current <= 0 ? showPage(slides.length - 1) : showPage(current - 1);
        }

        // Recalcula posições ao redimensionar a janela (importante no mobile)
        window.addEventListener('resize', () => {
            console.log("Janela redimensionada - recarregue a página para ajustar melhor");
            // Se quiser recalcular sem recarregar, é possível, mas mais complexo.
            // Por enquanto, recomendo recarregar em caso de mudança grande de orientação.
        });
    </script>
</body>
</html>
