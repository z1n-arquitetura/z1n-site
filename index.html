<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* SLIDER */
.slider{
  display:flex;
  width:100vw;
  height:100vh;
  transition: transform .3s ease;
}

.slide{
  min-width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* canvas correto */
canvas{
  display:block;
}

/* overlay alinhado ao canvas */
.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* LINKS */
.link{
  position:absolute;
  z-index:10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

let index = 0;
let startX = 0;

// NAV
function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  const diff = startX - e.changedTouches[0].clientX;
  if(Math.abs(diff) > 80){
    if(diff > 0) goTo(index+1);
    else goTo(index-1);
  }
});

// PDF
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const scale = window.devicePixelRatio || 1.5;
const viewport = page.getViewport({scale});

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

canvas.width = viewport.width;
canvas.height = viewport.height;

canvas.style.width = viewport.width + "px";
canvas.style.height = viewport.height + "px";

const slide = document.createElement('div');
slide.className="slide";

slide.appendChild(canvas);

// overlay alinhado ao canvas
const overlay = document.createElement('div');
overlay.className = "overlay";
overlay.style.width = canvas.style.width;
overlay.style.height = canvas.style.height;

slide.appendChild(overlay);
slider.appendChild(slide);

// render
page.render({canvasContext:ctx,viewport:viewport});

// função de link
function link(href, top, left, width, height){
  const el = document.createElement('a');

  el.href = href;
  el.className="link";

  if(href.includes("wa.me")){
    el.target="_blank";
  }

  el.style.top = top;
  el.style.left = left;
  el.style.width = width;
  el.style.height = height;

  overlay.appendChild(el);
}

// LINKS

if(i===1){
  link("tel:+5516991128533","76%","36%","34%","6%");
  link("https://wa.me/5516991128533","85%","32%","36%","8%");
}

if(i===6){
  link("https://wa.me/5516991128533","89%","32%","36%","8%");
}

if(i===8){
  link("tel:+5516991128533","70%","32%","36%","6%");
  link("https://wa.me/5516991128533","82%","44%","12%","10%");
}

});

}

});
</script>

</body>
</html>
