<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
.slider {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: auto;

  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;

  -webkit-overflow-scrolling: touch;
}
  
.slide {
  flex: none;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  scroll-snap-align: start;
  scroll-snap-stop: always;

  position: relative;
  overflow: hidden;
  background: #000;
}

canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.link {
  position: absolute;
  z-index: 10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'portfolio.pdf';

const slider = document.getElementById('slider');

pdfjsLib.getDocument(url).promise.then(pdf => {

  for (let i = 1; i <= pdf.numPages; i++) {

    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const slide = document.createElement('div');
      slide.className = 'slide';

      slide.appendChild(canvas);
      slider.appendChild(slide);

      page.render({ canvasContext: ctx, viewport });

      // WhatsApp clicável
      const wpp = document.createElement('a');
      wpp.href = "https://wa.me/5516991128533";
      wpp.className = "link";

      wpp.style.bottom = "8%";
      wpp.style.left = "50%";
      wpp.style.transform = "translateX(-50%)";
      wpp.style.width = "260px";
      wpp.style.height = "70px";

      slide.appendChild(wpp);

    });

  }

});
</script>
<script>
const slider = document.getElementById('slider');

document.addEventListener('keydown', function(e) {

  if (e.key === "ArrowRight") {
    slider.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
  }

  if (e.key === "ArrowLeft") {
    slider.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
  }

});
</script>
  <script>
const slider = document.getElementById('slider');

let isDown = false;
let startX;
let scrollLeft;

slider.addEventListener('mousedown', (e) => {
  isDown = true;
  startX = e.pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener('mouseleave', () => {
  isDown = false;
});

slider.addEventListener('mouseup', () => {
  isDown = false;
});

slider.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - slider.offsetLeft;
  const walk = (x - startX) * 1.5;
  slider.scrollLeft = scrollLeft - walk;
});
</script>
</body>
</html>
