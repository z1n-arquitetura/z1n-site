<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Z1N</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; position: relative; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Estilização das setas na parte inferior */
        .navegacao-inferior {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .seta {
            color: #fff;
            cursor: pointer;
            font-size: 24px;
            user-select: none;
            transition: 0.3s;
        }

        .seta:hover { opacity: 0.5; }

        /* Estilo opcional para link dentro da imagem (ex: na última página) */
        .link-area {
            position: absolute;
            bottom: 15%; /* Ajuste conforme a posição do seu design no PNG */
            display: flex;
            gap: 10px;
        }
        .btn-contato {
            padding: 10px 20px;
            background: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="p1.png"></div>
            <div class="swiper-slide"><img src="p2.png"></div>
            <div class="swiper-slide"><img src="p3.png"></div>
            <div class="swiper-slide"><img src="p4.png"></div>
            <div class="swiper-slide"><img src="p5.png"></div>
            <div class="swiper-slide"><img src="p6.png"></div>
            <div class="swiper-slide"><img src="p7.png"></div>
            
            <div class="swiper-slide">
                <img src="p8.png">
                <div class="link-area">
                    <a href="https://wa.me/55NUMERO" target="_blank" class="btn-contato">WhatsApp</a>
                    <a href="tel:+55NUMERO" class="btn-contato" style="background:#333;">Ligar</a>
                </div>
            </div>
        </div>
    </div>

    <div class="navegacao-inferior">
        <div class="seta" id="prev">&#10094;</div> <div class="seta" id="next">&#10095;</div> </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true, // SLIDE SEM FIM (INFINITO)
            grabCursor: true, // Mostra a mãozinha do mouse
            mousewheel: true, // Movimentação pelo scroll do mouse
            keyboard: true,   // Movimentação pelas setas do teclado
            navigation: {
                nextEl: '#next',
                prevEl: '#prev',
            },
        });
    </script>
</body>
</html>
