<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* SLIDER */
.slider{
  display:flex;
  height:100dvh;
  transition: transform .3s ease;
}

.slide{
  min-width:100vw;
  height:100dvh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CANVAS SEM DISTORÇÃO */
canvas{
  width:auto;
  height:100%;
  max-width:100%;
  display:block;
}

/* LINKS */
.link{
  position:absolute;
  z-index:10;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');

let index = 0;
let startX = 0;

// ===== NAVEGAÇÃO =====
function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  const diff = startX - e.changedTouches[0].clientX;
  if(Math.abs(diff) > 80){
    if(diff > 0) goTo(index+1);
    else goTo(index-1);
  }
});

// ===== PDF =====
pdfjsLib.getDocument('portfolio.pdf').promise.then(pdf=>{

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const v = page.getViewport({scale:2});

const canvas = document.createElement('canvas');
canvas.width = v.width;
canvas.height = v.height;

const ctx = canvas.getContext('2d');

const slide = document.createElement('div');
slide.className="slide";

slide.appendChild(canvas);
slider.appendChild(slide);

// ===== RENDER =====
page.render({canvasContext:ctx,viewport:v}).promise.then(()=>{

// 🔥 pega tamanho REAL exibido (corrige mobile)
const rect = canvas.getBoundingClientRect();

// ===== FUNÇÃO LINK CORRIGIDA =====
function link(href, top, left, width, height){

  const el = document.createElement('a');
  el.href = href;
  el.className="link";

  if(href.includes("wa.me")){
    el.target="_blank";
    el.rel="noopener";
  }

  el.style.top = (rect.top + rect.height * (parseFloat(top)/100)) + "px";
  el.style.left = (rect.left + rect.width * (parseFloat(left)/100)) + "px";
  el.style.width = (rect.width * (parseFloat(width)/100)) + "px";
  el.style.height = (rect.height * (parseFloat(height)/100)) + "px";

  document.body.appendChild(el);
}

// ===== LINKS =====

// Página 1
if(i===1){
  link("tel:+5516991128533","76%","36%","34%","6%");
  link("https://wa.me/5516991128533","85%","32%","36%","8%");
}

// Página 6
if(i===6){
  link("https://wa.me/5516991128533","89%","32%","36%","8%");
}

// Página 8
if(i===8){
  link("tel:+5516991128533","70%","32%","36%","6%");
  link("https://wa.me/5516991128533","82%","44%","12%","10%");
}

});

});

}

});
</script>

</body>
</html>
