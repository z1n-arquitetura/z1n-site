<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>

    <meta property="og:title" content="Z1N Arquiteturas">
    <meta property="og:description" content="Projetos exclusivos">
    <meta property="og:image" content="https://z1n-arq.com.br/og-image.jpg">
    <meta property="og:url" content="https://z1n-arq.com.br/">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .slide.active { display: flex; }

        .slide-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .link {
            position: absolute;
            z-index: 9999;
            border: 3px solid red;
            background: rgba(255,0,0,0.2);
            pointer-events: all;
            cursor: pointer;
        }

        .nav {
            position: absolute;
            bottom: 30px;
            z-index: 100;
            color: white;
            font-size: 42px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>
<body>

    <div class="slider" id="slider"></div>
    <button class="nav prev" onclick="prev()">←</button>
    <button class="nav next" onclick="next()">→</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Usando o PDF direto do seu domínio
        const pdfUrl = 'https://z1n-arq.com.br/portfolio.pdf';

        const slider = document.getElementById('slider');
        let slides = [];
        let current = 0;

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            console.log("✅ PDF carregado com", pdf.numPages, "páginas");

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const pageIndex = i;
                    const viewportBase = page.getViewport({ scale: 1 });

                    const scale = Math.min(
                        (window.innerWidth * 0.96) / viewportBase.width,
                        (window.innerHeight * 0.92) / viewportBase.height
                    );

                    const viewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper';

                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    wrapper.appendChild(canvas);
                    slide.appendChild(wrapper);
                    slider.appendChild(slide);
                    slides.push(slide);

                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        // Links ajustados (testados para ficar mais próximos)
                        if (pageIndex === 1) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1020, 690, 190, 130, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1200, 740, 510, 95, viewportBase);
                        }
                        if (pageIndex === 6) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1020, 870, 190, 130, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1200, 915, 490, 105, viewportBase);
                        }
                        if (pageIndex === slides.length) {
                            createLink(wrapper, "https://wa.me/5516991128533", 1280, 790, 170, 125, viewportBase);
                            createLink(wrapper, "tel:+5516991128533", 1060, 650, 600, 165, viewportBase);
                        }

                        if (slides.length === 1) slide.classList.add("active");
                    });
                });
            }
        }).catch(err => {
            console.error("Erro PDF:", err);
            alert("Erro ao carregar o PDF. Verifique se https://z1n-arq.com.br/portfolio.pdf abre diretamente.");
        });

        function createLink(wrapper, href, x, y, w, h, viewportBase) {
            const link = document.createElement('a');
            link.href = href;
            link.target = '_blank';
            link.rel = 'noopener';
            link.className = 'link';

            link.style.left = (x / viewportBase.width * 100) + '%';
            link.style.top = (y / viewportBase.height * 100) + '%';
            link.style.width = (w / viewportBase.width * 100) + '%';
            link.style.height = (h / viewportBase.height * 100) + '%';

            wrapper.appendChild(link);
        }

        function showPage(index) {
            slides.forEach(s => s.classList.remove("active"));
            if (slides[index]) slides[index].classList.add("active");
            current = index;
        }

        function next() {
            current = (current + 1) % slides.length;
            showPage(current);
        }

        function prev() {
            current = (current - 1 + slides.length) % slides.length;
            showPage(current);
        }

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
