<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z1N Arquiteturas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.slider{
  display:flex;
  height:100vh;
  transition: transform .3s ease;
}

.slide{
  min-width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  max-width:100vw;
  max-height:100vh;
  display:block;
}

.link{
  position:absolute;
  border:2px solid red;
}

#saveBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
}
</style>
</head>

<body>

<button id="saveBtn">SALVAR</button>
<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const slider = document.getElementById('slider');
let index = 0;
let startX = 0;

let linksData = [];
let saved = JSON.parse(localStorage.getItem("linksZ1N") || "[]");

// ===== NAVEGAÇÃO =====
function goTo(i){
  const total = slider.children.length;
  index = Math.max(0, Math.min(total-1, i));
  slider.style.transform = `translateX(-${index * 100}%)`;
}

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  const diff = startX - e.changedTouches[0].clientX;
  if(Math.abs(diff) > 80){
    if(diff > 0) goTo(index+1);
    else goTo(index-1);
  }
});

// ===== PDF =====
pdfjsLib.getDocument('portfolio.pdf').promise.then(async pdf=>{

slider.style.width = (pdf.numPages * 100) + "%";

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);
const viewport = page.getViewport({scale:2});

const slide = document.createElement('div');
slide.className="slide";

const canvas = document.createElement('canvas');
canvas.width = viewport.width;
canvas.height = viewport.height;

slide.appendChild(canvas);
slider.appendChild(slide);

// 🔥 AGUARDA RENDER COMPLETO (CRUCIAL)
await page.render({
  canvasContext:canvas.getContext('2d'),
  viewport:viewport
}).promise;

// ===== LINKS =====
function createLink(data){

const el = document.createElement('div');
el.className="link";

el.style.top = data.top;
el.style.left = data.left;
el.style.width = data.width;
el.style.height = data.height;

slide.appendChild(el);

linksData.push({page:i,el});
}

// carregar salvo
saved.forEach(item=>{
  if(item.page === i){
    createLink(item);
  }
});

// padrão inicial
if(saved.length === 0){

if(i===1){
  createLink({page:i,top:"76%",left:"36%",width:"34%",height:"6%"});
  createLink({page:i,top:"85%",left:"32%",width:"36%",height:"8%"});
}

if(i===6){
  createLink({page:i,top:"89%",left:"32%",width:"36%",height:"8%"});
}

if(i===8){
  createLink({page:i,top:"70%",left:"32%",width:"36%",height:"6%"});
  createLink({page:i,top:"82%",left:"44%",width:"12%",height:"10%"});
}

}

}

});

// ===== SALVAR =====
document.getElementById("saveBtn").onclick = ()=>{
let data = [];

linksData.forEach(item=>{
const el = item.el;

data.push({
  page:item.page,
  top:el.style.top,
  left:el.style.left,
  width:el.style.width,
  height:el.style.height
});
});

localStorage.setItem("linksZ1N", JSON.stringify(data));
alert("Salvo!");
};
</script>

</body>
</html>
